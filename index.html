<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patagonien Trip</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-20 font-sans">

    <!-- Header -->
    <header class="bg-blue-900 text-white p-4 sticky top-0 z-20 shadow-lg">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button onclick="changeDay(-1)" class="text-2xl px-4 active:scale-90 transition-transform">◀</button>
            <div class="text-center">
                <div id="display-region" class="text-[10px] uppercase tracking-widest opacity-70">Region</div>
                <h1 id="display-day" class="text-xl font-bold">Tag -</h1>
                <p id="display-date" class="text-sm opacity-90">--. --</p>
            </div>
            <button onclick="changeDay(1)" class="text-2xl px-4 active:scale-90 transition-transform">▶</button>
        </div>
        <div class="flex justify-around mt-3 max-w-sm mx-auto text-xs border-t border-blue-800 pt-2 font-mono">
            <span>🌅 <span id="sunrise">--:--</span></span>
            <span>🌇 <span id="sunset">--:--</span></span>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white flex justify-around shadow-sm sticky top-[104px] z-10 border-b">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-3 flex-1 text-xs tab-active uppercase tracking-tighter">Logistik</button>
        <button onclick="switchTab('aktiv')" id="btn-aktiv" class="p-3 flex-1 text-xs uppercase tracking-tighter">Aktivitäten</button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-3 flex-1 text-xs uppercase tracking-tighter">Foto & Info</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <!-- Risiko-Warnung -->
        <div id="risk-box" class="hidden bg-orange-100 border-l-4 border-orange-500 p-3 mb-4 rounded shadow-sm">
            <p class="text-xs font-bold text-orange-800 uppercase">Achtung / Risiko</p>
            <p id="risk-text" class="text-sm text-orange-900 font-medium"></p>
            <p id="planb-text" class="text-xs text-orange-700 mt-1 italic"></p>
        </div>

        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktiv" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>

    <script>
        // DATENBANK MIT SONNENZEITEN (Recherchiert für Okt 2024)
        const tripData = [
            { tag: 1, datum: "2024-10-15", dShort: "15. Okt", region: "Buenos Aires", kat: "Transfer", typ: "Flug", titel: "Flug MUC-MAD-EZE", details: "Iberia", start: "07:30", ende: "19:55", code: "IB123", risiko: "1h55 Connection in MAD", planb: "umbuchen", sun: ["06:17", "19:09"] },
            { tag: 1, datum: "2024-10-15", dShort: "15. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", details: "Check-in nach Ankunft", sun: ["06:17", "19:09"] },
            { tag: 2, datum: "2024-10-16", dShort: "16. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", sun: ["06:16", "19:10"] },
            { tag: 3, datum: "2024-10-17", dShort: "17. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", sun: ["06:14", "19:11"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Transfer", typ: "Flug", titel: "Flug AEP-FTE", details: "Aerolinas Argentinas", start: "09:20", ende: "12:40", code: "AR1870", risiko: "Wetter El Calafate", planb: "Later flight", sun: ["06:41", "20:32"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Transfer", typ: "Taxi", titel: "Taxi zu Airbnb", details: "Fahrt ca. 20 Min", start: "13:00", sun: ["06:41", "20:32"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Wohnen", typ: "Hotel", titel: "Airbnb El Calafate", details: "Calle Los Gauchos", start: "15:00", sun: ["06:41", "20:32"] },
            { tag: 5, datum: "2024-10-19", dShort: "19. Okt", region: "El Calafate", kat: "Aktivität", typ: "Ausflug", titel: "Fahrt zu Perito Moreno", details: "Mietwagen Station Flughafen", start: "08:00", sun: ["06:39", "20:34"] },
            { tag: 5, datum: "2024-10-19", dShort: "19. Okt", region: "El Calafate", kat: "Aktivität", typ: "Hiking", titel: "Gletscher Hiking Perito Moreno", details: "Treffpunkt Parkplatz", start: "10:00", ende: "15:00", shot_idea: "Eis-Strukturen mit Tele", objektiv: "100-400mm", best_light: "Blaues Licht Mittags", sun: ["06:39", "20:34"] }
        ];

        // Konfiguration der Icons
        const icons = {
            "Flug": "✈️",
            "Bus": "🚌",
            "Mietwagen": "🚗",
            "Hotel": "🏠",
            "Wohnen": "🏠",
            "Taxi": "🚕",
            "Hiking": "🥾",
            "Ausflug": "🗺️",
            "Transfer": "🔄"
        };

        let currentDayIndex = 0;
        let days = [];

        function init() {
            days = Array.from(new Set(tripData.map(d => d.tag)));
            const todayStr = new Date().toISOString().split('T')[0];
            const foundIndex = tripData.findIndex(d => d.datum === todayStr);
            currentDayIndex = foundIndex !== -1 ? days.indexOf(tripData[foundIndex].tag) : 0;
            render();
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const dayItems = tripData.filter(d => d.tag === currentTagNum);
            const firstItem = dayItems[0];

            document.getElementById('display-day').innerText = "Tag " + currentTagNum;
            document.getElementById('display-date').innerText = firstItem.dShort;
            document.getElementById('display-region').innerText = firstItem.region;
            document.getElementById('sunrise').innerText = firstItem.sun[0];
            document.getElementById('sunset').innerText = firstItem.sun[1];

            const riskItem = dayItems.find(i => i.risiko);
            if(riskItem) {
                document.getElementById('risk-box').classList.remove('hidden');
                document.getElementById('risk-text').innerText = riskItem.risiko;
                document.getElementById('planb-text').innerText = "Plan B: " + riskItem.planb;
            } else {
                document.getElementById('risk-box').classList.add('hidden');
            }

            document.getElementById('sec-logistik').innerHTML = "";
            document.getElementById('sec-aktiv').innerHTML = "";
            document.getElementById('sec-foto').innerHTML = "";

            dayItems.forEach(item => {
                const icon = icons[item.typ] || icons[item.kat] || "📍";
                
                if (["Transfer", "Wohnen", "Taxi", "Hotel", "Mietwagen", "Bus"].includes(item.kat) || ["Taxi", "Mietwagen", "Bus"].includes(item.typ)) {
                    document.getElementById('sec-logistik').appendChild(createCard(item, icon, "blue"));
                } else if (item.kat === "Aktivität") {
                    document.getElementById('sec-aktiv').appendChild(createCard(item, icon, "emerald"));
                }
                
                if (item.shot_idea || item.objektiv) {
                    document.getElementById('sec-foto').appendChild(createFotoCard(item));
                }
            });
        }

        function createCard(item, icon, color) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative";
            const mapsQuery = encodeURIComponent(`${item.titel} ${item.region}`);
            
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">${icon}</span>
                        <div>
                            <span class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">${item.typ}</span>
                            <h3 class="font-bold text-slate-800 leading-tight">${item.titel}</h3>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-blue-900">${item.start || ''}</p>
                        <p class="text-[10px] text-slate-400">${item.ende ? 'bis ' + item.ende : ''}</p>
                    </div>
                </div>
                <p class="text-sm text-slate-500 mt-2 ml-8">${item.details || ''}</p>
                <div class="mt-3 pt-3 border-t border-slate-50 flex justify-between items-center ml-8">
                    <span class="text-[10px] font-mono bg-slate-100 px-2 py-1 rounded">${item.code || '-'}</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${mapsQuery}" 
                       target="_blank" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold flex items-center">
                        📍 Maps
                    </a>
                </div>
            `;
            return div;
        }

        function createFotoCard(item) {
            const div = document.createElement('div');
            div.className = "bg-slate-800 text-white p-4 rounded-xl shadow-lg border-l-4 border-orange-500";
            div.innerHTML = `
                <h3 class="font-bold text-orange-400 text-sm mb-1">📸 ${item.titel}</h3>
                <p class="text-xs italic text-slate-300">"${item.shot_idea}"</p>
                <div class="grid grid-cols-2 gap-2 mt-3 text-[10px]">
                    <div class="bg-slate-700 p-2 rounded"><strong>Licht:</strong><br>${item.best_light || 'egal'}</div>
                    <div class="bg-slate-700 p-2 rounded"><strong>Linse:</strong><br>${item.objektiv || 'Standard'}</div>
                </div>
            `;
            return div;
        }

        function switchTab(tab) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + tab).classList.add('tab-active');
            document.querySelectorAll('main > div:not(#risk-box)').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
        }

        function changeDay(delta) {
            if (days[currentDayIndex + delta]) {
                currentDayIndex += delta;
                render();
                window.scrollTo(0,0);
            }
        }

        init();
    </script>
</body>
</html>
