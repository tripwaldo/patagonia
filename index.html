<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planer Pro | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-icon { width: 48px; height: 52px; background: white; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; align-items: center; line-height: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .cal-m { background: #ef4444; color: white; width: 100%; font-size: 9px; font-weight: 800; padding: 3px 0; text-align: center; text-transform: uppercase; }
        .cal-d { color: #1e293b; font-size: 20px; font-weight: 900; padding-top: 3px; }
        .trip-card { transition: all 0.3s ease; }
        .trip-card:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-6 pb-12">

    <header class="text-center mt-8 mb-12 font-sans">
        <h1 class="text-4xl font-black tracking-tighter uppercase mb-1 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
            Trip Planer Pro
        </h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold text-center">Family Travel Hub</p>
    </header>

    <div id="trip-container" class="max-w-md mx-auto space-y-6"></div>

    <script>
        const icsUrl = "https://www.tripit.com/feed/ical/private/BBA87953-1BD926860BD8421FC64ECFA593BA7A11/tripit.ics";
        const proxyUrl = "https://corsproxy.io/?";

        const tripSettings = {
            "patagonien": { title: "Patagonien", sub: "Chile & Argentinien", img: "https://images.pexels.com/photos/9224586/pexels-photo-9224586.jpeg?auto=compress&w=600", wer: "👨‍👩‍👧‍👦", defaultDate: "15. Okt 2024", sortDate: "20241015" },
            "toskana": { title: "Toskana", sub: "Italien Genussreise", img: "https://images.pexels.com/photos/1534445/pexels-photo-1534445.jpeg?auto=compress&w=600", wer: "👨‍🦱👩‍🦰", defaultDate: "20. Jun 2024", sortDate: "20240620" },
            "galizien": { title: "Galizien", sub: "Spanien Nordküste", img: "https://images.pexels.com/photos/3565916/pexels-photo-3565916.jpeg?auto=compress&w=600", wer: "👨‍🦱👦👧", defaultDate: "05. Sep 2024", sortDate: "20240905" },
            "australien": { title: "Australien", sub: "Work & Travel", img: "https://images.pexels.com/photos/2101037/pexels-photo-2101037.jpeg?auto=compress&w=600", wer: "👨‍🦱", defaultDate: "01. Jan 2025", sortDate: "20250101" },
            "kanada": { title: "Kanada", sub: "Vancouver Island", img: "https://images.pexels.com/photos/1525041/pexels-photo-1525041.jpeg?auto=compress&w=600", wer: "👩‍🦰", defaultDate: "10. Aug 2024", sortDate: "20240810" }
        };

        let foundDates = {};

        async function init() {
            await fetchTripIt();
            renderHub();
        }

        async function fetchTripIt() {
            try {
                const response = await fetch(proxyUrl + encodeURIComponent(icsUrl));
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                let currentEvent = {};
                lines.forEach(line => {
                    if (line.startsWith("BEGIN:VEVENT")) currentEvent = {};
                    if (line.startsWith("SUMMARY:")) currentEvent.summary = line.substring(8).toLowerCase();
                    if (line.startsWith("DTSTART")) {
                        const m = line.match(/\d{8}/);
                        if (m) currentEvent.start = m[0];
                    }
                    if (line.startsWith("END:VEVENT")) {
                        Object.keys(tripSettings).forEach(key => {
                            if (currentEvent.summary && currentEvent.summary.includes(key)) {
                                if (!foundDates[key] || currentEvent.start < foundDates[key]) foundDates[key] = currentEvent.start;
                            }
                        });
                    }
                });
            } catch (e) { console.log("TripIt Sync hakt."); }
        }

        function renderHub() {
            const container = document.getElementById('trip-container');
            const months = ["", "Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
            
            // SORTIERUNG: Absteigend nach Datum (Neuere zuerst)
            const sortedKeys = Object.keys(tripSettings).sort((a, b) => {
                const dateA = foundDates[a] || tripSettings[a].sortDate;
                const dateB = foundDates[b] || tripSettings[b].sortDate;
                return dateB.localeCompare(dateA);
            });

            container.innerHTML = sortedKeys.map(key => {
                const cfg = tripSettings[key];
                let d = foundDates[key] ? foundDates[key].substring(6,8) : cfg.defaultDate.split(". ")[0];
                let m = foundDates[key] ? months[parseInt(foundDates[key].substring(4,6))] : cfg.defaultDate.split(" ")[1];
                let y = foundDates[key] ? foundDates[key].substring(0,4) : cfg.defaultDate.split(" ")[2];

                return `
                    <a href="./${key}/index.html" class="trip-card block group relative bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl mb-6">
                        <div class="h-52 w-full relative">
                            <img src="${cfg.img}" class="w-full h-full object-cover opacity-50 group-hover:scale-105 transition-transform duration-1000">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
                        </div>
                        <div class="absolute inset-0 p-6 flex flex-col justify-between font-sans">
                            <div class="flex justify-between items-start">
                                <div class="calendar-icon"><div class="cal-m">${m}</div><div class="cal-d">${d}</div></div>
                                <div class="bg-blue-600/80 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-white/10">${y}</div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div><h2 class="text-3xl font-black italic tracking-tighter uppercase leading-none">${cfg.title}</h2><p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mt-1">${cfg.sub}</p></div>
                                <span class="text-2xl drop-shadow-lg">${cfg.wer}</span>
                            </div>
                        </div>
                    </a>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
