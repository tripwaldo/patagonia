<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-icon { width: 50px; height: 54px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .calendar-header { background: #ef4444; color: white; width: 100%; font-size: 10px; font-weight: bold; padding: 4px 0; text-align: center; text-transform: uppercase; }
        .calendar-day { color: #1e293b; font-size: 22px; font-weight: 900; padding-top: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-6 pb-12">
    <header class="text-center mt-8 mb-12">
        <h1 class="text-4xl font-black tracking-tighter uppercase mb-1 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">Trip Planer Pro</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold text-center w-full">Family Travel Hub</p>
    </header>

    <div class="max-w-md mx-auto space-y-8">
        <!-- Patagonien Karte -->
        <a href="./patagonien/index.html" class="block group relative bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl transition-all active:scale-95">
            <div class="h-48 w-full relative">
                <img src="https://images.pexels.com/photos/9224586/pexels-photo-9224586.jpeg?auto=compress&cs=tinysrgb&w=600" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
            </div>
            <div class="absolute inset-0 p-6 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <div class="flex gap-2">
                        <div class="calendar-icon"><div class="calendar-header">Okt</div><div class="calendar-day">15</div></div>
                        <div class="text-white/30 self-center text-xl">→</div>
                        <div class="calendar-icon"><div class="calendar-header">Nov</div><div class="calendar-day">12</div></div>
                    </div>
                    <div class="bg-blue-600/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">28 Tage</div>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black italic tracking-tighter uppercase">Patagonien</h2>
                        <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Chile & Argentinien</p>
                    </div>
                    <div class="flex -space-x-2"><span class="text-xl drop-shadow-lg">👨‍👩‍👧‍👦</span></div>
                </div>
            </div>
        </a>

        <!-- Platzhalter für Toskana -->
        <div class="opacity-50 grayscale block relative bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5">
            <div class="h-32 flex items-center justify-center italic text-slate-500">Kommende Reise: Toskana</div>
        </div>
    </div>
</body>
</html>
