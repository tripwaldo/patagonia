<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patagonien Reise-Planer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20 font-sans">

    <!-- Header -->
    <header class="bg-blue-900 text-white p-4 sticky top-0 z-20 shadow-lg">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button onclick="changeDay(-1)" class="text-2xl px-4 active:scale-90 transition-transform">◀</button>
            <div class="text-center">
                <div id="display-region" class="text-[10px] uppercase tracking-widest opacity-70">Region</div>
                <h1 id="display-day" class="text-xl font-bold">Tag -</h1>
                <p id="display-date" class="text-sm opacity-90">--. --</p>
            </div>
            <button onclick="changeDay(1)" class="text-2xl px-4 active:scale-90 transition-transform">▶</button>
        </div>
        <div class="flex justify-around mt-3 max-w-sm mx-auto text-xs border-t border-blue-800 pt-2">
            <span>🌅 Auf: <span id="sunrise">--:--</span></span>
            <span>🌇 Ab: <span id="sunset">--:--</span></span>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white flex justify-around shadow-sm sticky top-[104px] z-10 border-b border-slate-200">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-3 flex-1 text-sm tab-active uppercase tracking-tight">Logistik</button>
        <button onclick="switchTab('aktiv')" id="btn-aktiv" class="p-3 flex-1 text-sm uppercase tracking-tight">Aktivitäten</button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-3 flex-1 text-sm uppercase tracking-tight">Foto/Info</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <!-- Wichtige Hinweise / Risiko -->
        <div id="risk-box" class="hidden bg-amber-50 border-l-4 border-amber-500 p-3 mb-4 rounded-r shadow-sm">
            <div class="flex items-start">
                <span class="mr-2">⚠️</span>
                <div>
                    <p class="text-xs font-bold text-amber-800 uppercase">Wichtiger Hinweis / Risiko</p>
                    <p id="risk-text" class="text-sm text-amber-900"></p>
                    <p id="planb-text" class="text-xs text-amber-700 mt-1 italic font-medium"></p>
                </div>
            </div>
        </div>

        <!-- Sektionen -->
        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktiv" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>

    <script>
        // DATENBANK (Aus deiner CSV generiert)
        const tripData = [
            { tag: 1, datum: "2024-10-15", dShort: "15. Okt", region: "Buenos Aires", kat: "Transfer", typ: "Flug", titel: "Flug MUC-MAD-EZE", details: "Iberia (574€)", start: "07:30", ende: "19:55", code: "IB123", risiko: "1h55 Connection in MAD", planb: "umbuchen", sun: ["-", "-"] },
            { tag: 1, datum: "2024-10-15", dShort: "15. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", details: "noch buchen", start: "", ende: "", code: "OPEN", sun: ["-", "-"] },
            { tag: 2, datum: "2024-10-16", dShort: "16. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", details: "noch buchen", sun: ["-", "-"] },
            { tag: 3, datum: "2024-10-17", dShort: "17. Okt", region: "Buenos Aires", kat: "Wohnen", typ: "Hotel", titel: "Airbnb Buenos Aires", details: "noch buchen", sun: ["-", "-"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Transfer", typ: "Flug", titel: "Flug - AEP-FTE", details: "Aerolinas Argentinas", start: "09:20", ende: "12:40", code: "400€", risiko: "Wetter/Storno", planb: "umbuchen", sun: ["06:39", "20:30"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Transfer", typ: "Taxi", titel: "Taxi zu Airbnb", details: "Flexibel", start: "", ende: "", code: "40€", sun: ["06:39", "20:30"] },
            { tag: 4, datum: "2024-10-18", dShort: "18. Okt", region: "El Calafate", kat: "Wohnen", typ: "Hotel", titel: "Airbnb El Calafate", details: "Check-in 15:00", start: "15:00", code: "203€", sun: ["06:39", "20:30"] },
            { tag: 5, datum: "2024-10-19", dShort: "19. Okt", region: "El Calafate", kat: "Aktivität", typ: "Ausflug", titel: "Fahrt zu Perito Moreno", details: "Mietwagen/Bus", start: "08:00", ende: "09:00", sun: ["06:37", "20:32"] },
            { tag: 5, datum: "2024-10-19", dShort: "19. Okt", region: "El Calafate", kat: "Aktivität", typ: "Hiking", titel: "Gletscher Hiking Perito Moreno", details: "Gute Schuhe einpacken!", start: "10:00", ende: "15:00", sun: ["06:37", "20:32"], shot_idea: "Weitwinkel von den Balkonen, Zoom auf Eisabbruch", objektiv: "24-70mm & 100-400mm", best_light: "Mittag für blaues Eis" }
        ];

        let currentDayIndex = 0;
        let days = [];

        function init() {
            days = Array.from(new Set(tripData.map(d => d.tag)));
            
            // Finde heutigen Tag oder nächsten verfügbaren
            const todayStr = new Date().toISOString().split('T')[0];
            const foundIndex = tripData.findIndex(d => d.datum === todayStr);
            
            if (foundIndex !== -1) {
                currentDayIndex = days.indexOf(tripData[foundIndex].tag);
            } else {
                currentDayIndex = 0; // Standard: Tag 1
            }

            render();

            // Service Worker Registrierung für Offline-Modus
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(() => {
                    console.log("Service Worker aktiv!");
                });
            }
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const dayItems = tripData.filter(d => d.tag === currentTagNum);
            const firstItem = dayItems[0];

            // Header
            document.getElementById('display-day').innerText = "Tag " + currentTagNum;
            document.getElementById('display-date').innerText = firstItem.dShort;
            document.getElementById('display-region').innerText = firstItem.region;
            document.getElementById('sunrise').innerText = firstItem.sun[0];
            document.getElementById('sunset').innerText = firstItem.sun[1];

            // Risiko-Box anzeigen wenn vorhanden
            const riskItem = dayItems.find(i => i.risiko);
            if(riskItem) {
                document.getElementById('risk-box').classList.remove('hidden');
                document.getElementById('risk-text').innerText = riskItem.risiko;
                document.getElementById('planb-text').innerText = "Plan B: " + riskItem.planb;
            } else {
                document.getElementById('risk-box').classList.add('hidden');
            }

            // Listen füllen
            document.getElementById('sec-logistik').innerHTML = "";
            document.getElementById('sec-aktiv').innerHTML = "";
            document.getElementById('sec-foto').innerHTML = "";

            dayItems.forEach(item => {
                if (["Transfer", "Wohnen", "Taxi"].includes(item.kat)) {
                    document.getElementById('sec-logistik').appendChild(createCard(item, "blue"));
                } else if (item.kat === "Aktivität") {
                    document.getElementById('sec-aktiv').appendChild(createCard(item, "emerald"));
                }
                
                if (item.shot_idea || item.objektiv) {
                    document.getElementById('sec-foto').appendChild(createFotoCard(item));
                }
            });

            // Falls Sektion leer ist
            checkEmpty('sec-logistik', 'Keine Transport-Infos.');
            checkEmpty('sec-aktiv', 'Keine Aktivitäten geplant.');
            checkEmpty('sec-foto', 'Keine Fotospots für heute.');
        }

        function createCard(item, color) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden";
            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] bg-${color}-100 text-${color}-700 px-2 py-0.5 rounded uppercase font-bold">${item.typ}</span>
                    <div class="text-right">
                        <p class="font-bold text-blue-900 leading-none">${item.start || ''}</p>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase">${item.ende ? 'bis ' + item.ende : ''}</p>
                    </div>
                </div>
                <h3 class="font-bold text-slate-800">${item.titel}</h3>
                <p class="text-sm text-slate-500 mb-3">${item.details || ''}</p>
                <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                    <span class="text-xs font-mono bg-slate-50 px-2 py-1 rounded">${item.code || '-'}</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.titel + ' ' + item.region)}" 
                       target="_blank" class="text-blue-600 text-xs font-bold flex items-center">
                        <span class="mr-1">📍</span> MAPS
                    </a>
                </div>
            `;
            return div;
        }

        function createFotoCard(item) {
            const div = document.createElement('div');
            div.className = "bg-slate-900 text-white p-4 rounded-xl shadow-lg border-l-4 border-orange-500";
            div.innerHTML = `
                <h3 class="font-bold text-orange-400 mb-2">📸 ${item.titel}</h3>
                <p class="text-sm italic text-slate-300">"${item.shot_idea}"</p>
                <div class="mt-4 space-y-2 text-xs">
                    <div class="flex justify-between border-b border-slate-800 pb-1 text-slate-400"><span>Licht</span><span class="text-white">${item.best_light}</span></div>
                    <div class="flex justify-between border-b border-slate-800 pb-1 text-slate-400"><span>Linse</span><span class="text-white">${item.objektiv}</span></div>
                </div>
            `;
            return div;
        }

        function switchTab(tab) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + tab).classList.add('tab-active');
            document.querySelectorAll('main > div:not(#risk-box)').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
        }

        function changeDay(delta) {
            if (days[currentDayIndex + delta]) {
                currentDayIndex += delta;
                render();
                window.scrollTo(0,0);
            }
        }

        function checkEmpty(id, msg) {
            const el = document.getElementById(id);
            if(el.innerHTML === "") {
                el.innerHTML = `<p class="text-center text-slate-400 text-sm py-10 italic">${msg}</p>`;
            }
        }

        init();
    </script>
</body>
</html>
