<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patagonien Reise</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .indicator-dot { height: 7px; width: 7px; background-color: #3b82f6; border-radius: 50%; display: inline-block; margin-left: 4px; vertical-align: middle; }
        .alert-card { border-left: 6px solid #ef4444; background-color: #fef2f2; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-20 font-sans">

    <!-- Header & Hero Image -->
    <header class="relative bg-blue-900 text-white overflow-hidden shadow-lg">
        <div id="hero-img-container" class="h-48 w-full relative bg-slate-800">
            <img id="hero-img" src="" alt="Region" class="w-full h-full object-cover opacity-80 transition-opacity duration-500">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-10">
            <button onclick="changeDay(-1)" class="bg-black/30 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 transition-transform">◀</button>
            <div class="text-center shadow-sm">
                <div id="display-region" class="text-[10px] uppercase tracking-widest text-white/80 font-bold">Region</div>
                <h1 id="display-day" class="text-xl font-bold italic text-white">Tag -</h1>
            </div>
            <button onclick="changeDay(1)" class="bg-black/30 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 transition-transform">▶</button>
        </div>

        <div class="absolute bottom-4 left-0 w-full px-4 flex justify-between items-end z-10">
            <p id="display-date" class="text-lg font-bold">--. --</p>
            <div class="flex space-x-3 text-[10px] font-mono bg-black/20 p-1 rounded backdrop-blur-sm">
                <span>🌅 <span id="sunrise">--:--</span></span>
                <span>🌇 <span id="sunset">--:--</span></span>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white flex justify-around shadow-sm sticky top-0 z-20 border-b">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-3 flex-1 text-[11px] uppercase tracking-tighter">
            Logistik<span id="dot-logistik" class="indicator-dot hidden"></span>
        </button>
        <button onclick="switchTab('aktiv')" id="btn-aktiv" class="p-3 flex-1 text-[11px] uppercase tracking-tighter">
            Aktivität<span id="dot-aktiv" class="indicator-dot hidden"></span>
        </button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-3 flex-1 text-[11px] uppercase tracking-tighter">
            Foto/Info<span id="dot-foto" class="indicator-dot hidden"></span>
        </button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div id="day-alerts" class="space-y-3 mb-6"></div>
        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktiv" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>

    <script>
        let tripData = [];
        let days = [];
        let currentDayIndex = 0;

        const icons = {
            "Flug": "✈️", "Hotel": "🏨", "Taxi": "🚕", "Mietwagen": "🚗",
            "Bus": "🚌", "Alert": "⚠️", "Ausflug": "🗺️", "Hiking": "🥾",
            "Fotospot": "📸", "Restaurant": "🍽️"
        };

        // Bilder-Datenbank (Region zu Unsplash URL)
        const regionImages = {
            "Buenos Aires": "https://images.unsplash.com/photo-1589909202802-8f4aadce1849?auto=format&fit=crop&w=800&q=80",
            "El Calafate": "https://images.unsplash.com/photo-1516901632977-d141a38d4f9e?auto=format&fit=crop&w=800&q=80",
            "El Chaltén": "https://images.unsplash.com/photo-1544198365-f5d60b6d8190?auto=format&fit=crop&w=800&q=80",
            "Ushuaia": "https://images.unsplash.com/photo-1563294373-108709320215?auto=format&fit=crop&w=800&q=80",
            "Torres del Paine": "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=800&q=80",
            "Puerto Natales": "https://images.unsplash.com/photo-1510444315264-5a2108168233?auto=format&fit=crop&w=800&q=80",
            "Bariloche": "https://images.unsplash.com/photo-1605333333333-333333333333?auto=format&fit=crop&w=800&q=80",
            "Default": "https://images.unsplash.com/photo-1476451042684-979465856389?auto=format&fit=crop&w=800&q=80"
        };

        function loadCSV() {
            Papa.parse("trip_data.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    tripData = results.data;
                    processData();
                }
            });
        }
