<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Südamerika Reise 2024</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .indicator-dot { height: 7px; width: 7px; background-color: #3b82f6; border-radius: 50%; display: inline-block; margin-left: 4px; vertical-align: middle; }
        .alert-card { border-left: 6px solid #ef4444; background-color: #fef2f2; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-20 font-sans">

    <!-- Header & Hero Image -->
    <header class="relative bg-slate-900 text-white overflow-hidden shadow-lg h-72">
        <div id="hero-img-container" class="absolute inset-0 bg-slate-800">
            <img id="hero-img" src="" alt="Region" class="w-full h-full object-cover opacity-70 transition-opacity duration-500">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        
        <!-- Top Nav (Arrows & Region) -->
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-10 text-white">
            <button onclick="changeDay(-1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 border border-white/10">◀</button>
            <div class="text-center">
                <div id="display-region" class="text-[10px] uppercase tracking-[0.2em] text-blue-300 font-bold drop-shadow-md">Region</div>
                <h1 id="display-day" class="text-xl font-bold italic drop-shadow-md tracking-tight">Lade...</h1>
            </div>
            <button onclick="changeDay(1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 border border-white/10">▶</button>
        </div>

        <!-- Bottom Info Area -->
        <div class="absolute bottom-6 left-0 w-full px-6 flex justify-between items-end z-10">
            <div>
                <p id="display-date" class="text-3xl font-black drop-shadow-lg leading-none">--. --</p>
                <p class="text-[10px] uppercase tracking-[0.3em] text-white/50 mt-2 font-light italic">Patagonien & Atacama</p>
            </div>

            <div class="flex flex-col items-end space-y-3">
                <!-- Unterkunft Bild & Name (aus Spalte 'Home') -->
                <div id="home-preview" class="hidden flex flex-col items-end">
                    <img id="home-img" src="" class="w-16 h-12 object-cover rounded-lg border border-white/30 shadow-2xl bg-slate-700">
                    <span id="home-title" class="text-[9px] text-white font-bold mt-1 max-w-[90px] truncate text-right drop-shadow-md uppercase tracking-tighter">Hotel</span>
                </div>

                <!-- Sun Times -->
                <div class="flex space-x-3 text-[11px] font-mono bg-black/60 px-3 py-1.5 rounded-lg backdrop-blur-md border border-white/10 shadow-xl">
                    <span>🌅 <span id="sunrise">--:--</span></span>
                    <span>🌇 <span id="sunset">--:--</span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation Tab Bar -->
    <nav class="bg-white flex justify-around shadow-md sticky top-0 z-20 border-b border-slate-200">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Logistik<span id="dot-logistik" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('aktiv')" id="btn-aktiv" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Aktivität<span id="dot-aktiv" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Wichtig<span id="dot-foto" class="indicator-dot hidden"></span></button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div id="day-alerts" class="space-y-3 mb-5"></div>
        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktiv" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>
