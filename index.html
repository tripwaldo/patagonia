<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Südamerika Reise 2024</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .indicator-dot { height: 7px; width: 7px; background-color: #3b82f6; border-radius: 50%; display: inline-block; margin-left: 4px; vertical-align: middle; }
        .alert-card { border-left: 6px solid #ef4444; background-color: #fef2f2; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%); }
        .spot-text-gradient { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        .snap-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .snap-x::-webkit-scrollbar { display: none; }
        .snap-center { scroll-snap-align: center; scroll-snap-stop: always; }
        #home-img { -webkit-touch-callout: none; user-select: none; pointer-events: auto; }
        body { overscroll-behavior-y: contain; overflow-x: hidden; width: 100%; position: relative; }
        .item-done img { filter: grayscale(0.6) brightness(0.4); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-20 font-sans">

    <!-- HIKE OVERLAY -->
    <div id="hike-overlay" class="hidden fixed inset-0 z-[140] bg-black flex flex-col">
        <button onclick="closeOverlay('hike-overlay')" class="absolute top-6 right-6 z-[150] bg-black/40 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center text-3xl border border-white/10 shadow-2xl">&times;</button>
        <div id="hike-slider" class="flex-1 flex overflow-x-auto snap-x h-full"></div>
    </div>

    <!-- FOTOSPOT OVERLAY -->
    <div id="spot-overlay" class="hidden fixed inset-0 z-[110] bg-black flex flex-col">
        <button onclick="closeOverlay('spot-overlay')" class="absolute top-6 right-6 z-[130] bg-black/40 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center text-3xl border border-white/10 shadow-2xl">&times;</button>
        <div id="spot-slider" class="flex-1 flex overflow-x-auto snap-x h-full"></div>
    </div>

    <!-- TICKET OVERLAY -->
    <div id="ticket-overlay" class="hidden fixed inset-0 z-[160] bg-black flex flex-col items-center justify-center p-6 backdrop-blur-xl" onclick="this.classList.add('hidden')">
        <img id="ticket-img" src="" class="max-w-full max-h-[70vh] rounded-lg shadow-2xl border-4 border-white">
        <p class="text-white mt-6 font-bold uppercase tracking-widest text-sm text-center font-sans">Ticket / QR-Code<br><span class="text-[10px] opacity-50">Tippen zum Schließen</span></p>
    </div>

    <!-- VOLLBILD UNTERKUNFT OVERLAY -->
    <div id="image-overlay" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 backdrop-blur-sm">
        <img id="overlay-img" src="" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl border border-white/20">
    </div>

    <!-- Header -->
    <header class="relative bg-slate-900 text-white overflow-hidden shadow-lg h-80">
        <div id="hero-img-container" class="absolute inset-0 bg-slate-800">
            <img id="hero-img" src="" class="w-full h-full object-cover opacity-70 transition-opacity duration-500">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-10">
            <button onclick="changeDay(-1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 border border-white/10">◀</button>
            <div class="text-center font-sans">
                <div id="display-region" class="text-[10px] uppercase tracking-[0.2em] text-blue-300 font-bold drop-shadow-md">Region</div>
                <h1 id="display-day" class="text-xl font-bold italic drop-shadow-md tracking-tight">Lade...</h1>
            </div>
            <button onclick="changeDay(1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center active:scale-90 border border-white/10">▶</button>
        </div>
        <div class="absolute bottom-6 left-0 w-full px-6 flex justify-between items-end z-10 text-white font-sans">
            <div><p id="display-date" class="text-3xl font-black drop-shadow-lg leading-none">--. --</p></div>
            <div class="flex flex-col items-end space-y-3">
                <div id="home-preview" class="hidden flex flex-col items-end">
                    <img id="home-img" src="" class="w-32 h-24 object-cover rounded-xl border-2 border-white/40 shadow-2xl bg-slate-700">
                    <span id="home-title" class="text-[10px] text-white font-black mt-2 max-w-[120px] truncate text-right uppercase tracking-tight">Hotel</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="btn-hikes" onclick="openHikeOverlay()" class="hidden bg-emerald-600 text-white w-9 h-9 rounded-lg flex items-center justify-center shadow-lg active:scale-90 border border-white/20">🥾</button>
                    <button id="btn-camera" onclick="openSpotOverlay()" class="hidden bg-orange-500 text-white w-9 h-9 rounded-lg flex items-center justify-center shadow-lg active:scale-90 border border-white/20">📸</button>
                    <div class="flex space-x-3 text-[11px] font-mono bg-black/60 px-3 py-1.5 rounded-lg backdrop-blur-md border border-white/10 shadow-xl font-bold">
                        <span>🌅 <span id="sunrise">--:--</span></span>
                        <span>🌇 <span id="sunset">--:--</span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white flex justify-around shadow-md sticky top-0 z-20 border-b border-slate-200">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-4 flex-1 text-[11px] uppercase tracking-tighter font-bold">Logistik<span id="dot-logistik" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('aktiv')" id="btn-aktiv" class="p-4 flex-1 text-[11px] uppercase tracking-tighter font-bold">Aktivität<span id="dot-aktiv" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-4 flex-1 text-[11px] uppercase tracking-tighter font-bold">Wichtig<span id="dot-foto" class="indicator-dot hidden"></span></button>
    </nav>

    <main class="p-4 max-w-md mx-auto min-h-[50vh]">
        <div id="day-alerts" class="space-y-3 mb-5"></div>
        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktiv" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>

    <script>
        let tripData = [], spotData = [], hikeData = [], days = [], currentDayIndex = 0, isPeeking = false;
        const icons = { "Flug": "✈️", "Hotel": "🏨", "Taxi": "🚕", "Mietwagen": "🚗", "Bus": "🚌", "Alert": "⚠️", "Ausflug": "🗺️", "Hiking": "🥾", "Fotospot": "📸", "Restaurant": "🍽️" };
        const regionImages = {
            "buenos aires": "https://images.pexels.com/photos/34104156/pexels-photo-34104156.jpeg?auto=format&fit=crop&w=800&q=80",
            "el calafate argentinien": "https://images.pexels.com/photos/9224586/pexels-photo-9224586.jpeg?auto=format&fit=crop&w=800&q=80",
            "torres del paine": "https://images.unsplash.com/photo-1544198365-f5d60b6d8190?auto=format&fit=crop&w=800&q=80",
            "santiago de chile": "https://images.pexels.com/photos/35858884/pexels-photo-35858884.jpeg?auto=format&fit=crop&w=800&q=80",
            "san pedro de atacama": "https://images.pexels.com/photos/20853000/pexels-photo-20853000.jpeg?auto=format&fit=crop&w=800&q=80",
            "matanzas": "https://a0.muscache.com/im/pictures/hosting/Hosting-1580583864418203432/original/fe81def6-95c3-4848-aad9-a964c71794c9.jpeg?auto=format&fit=crop&w=800&q=80",
            "münchen": "https://images.pexels.com/photos/37584876/pexels-photo-37584876.jpeg?auto=format&fit=crop&w=800&q=80",
            "default": "https://images.pexels.com/photos/20890197/pexels-photo-20890197.jpeg?auto=format&fit=crop&w=800&q=80"
        };

        function loadCSV() {
            Papa.parse("trip_data.csv", { download: true, header: true, skipEmptyLines: true, complete: r1 => {
                tripData = r1.data;
                Papa.parse("photo_spots.csv", { download: true, header: true, skipEmptyLines: true, complete: r2 => {
                    spotData = r2.data;
                    Papa.parse("hikes.csv", { download: true, header: true, skipEmptyLines: true, complete: r3 => {
                        hikeData = r3.data; processData();
                    }});
                }});
            }});
        }

        function timeToMinutes(t) { if (!t || !t.includes(':')) return 9999; const p = t.split(':'); return (parseInt(p[0]) * 60) + parseInt(p[1]); }

        function processData() {
            days = [...new Set(tripData.map(item => parseInt(item["Tag#"])))].sort((a, b) => a - b);
            const now = new Date(), months = {"Jan":0, "Feb":1, "Mär":2, "Apr":3, "Mai":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Okt":9, "Nov":10, "Dez":11};
            let todayTag = days[0];
            tripData.forEach(item => { if(item.Datum) { const p = item.Datum.split(". "); if(now.getDate() === parseInt(p[0]) && now.getMonth() === months[p[1]]) todayTag = parseInt(item["Tag#"]); }});
            currentDayIndex = days.indexOf(todayTag);
            if(currentDayIndex === -1) currentDayIndex = 0;
            render();
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const items = tripData.filter(i => parseInt(i["Tag#"]) === currentTagNum);
            items.sort((a, b) => timeToMinutes(a.Startzeit) - timeToMinutes(b.Startzeit));
            const rawRegion = items[0].Region || "Default", regionKey = rawRegion.toLowerCase().trim();
            
            document.getElementById('display-day').innerText = "Tag " + currentTagNum;
            document.getElementById('display-date').innerText = items[0].Datum;
            document.getElementById('display-region').innerText = rawRegion;
            document.getElementById('sunrise').innerText = items[0].Sunrise || "--:--";
            document.getElementById('sunset').innerText = items[0].Sunset || "--:--";
            document.getElementById('hero-img').src = regionImages[regionKey] || regionImages["default"];

            const hasSpots = spotData.some(s => s.Region.toLowerCase().trim().includes(regionKey) || (regionKey.includes("paine") && s.Region.toLowerCase().includes("paine")));
            const hasHikes = hikeData.some(h => h.Region.toLowerCase().trim().includes(regionKey) || (regionKey.includes("paine") && h.Region.toLowerCase().includes("paine")));
            document.getElementById('btn-camera').classList.toggle('hidden', !hasSpots);
            document.getElementById('btn-hikes').classList.toggle('hidden', !hasHikes);

            const homeItem = items.find(i => i.Home && i.Home.trim() !== "");
            if(homeItem) {
                const hPre = document.getElementById('home-preview'), hImg = document.getElementById('home-img');
                hPre.classList.remove('hidden'); hImg.src = homeItem.Home;
                document.getElementById('home-title').innerText = homeItem.Hometitle || homeItem.Titel;
                const showP = (e) => { e.preventDefault(); isPeeking = true; document.getElementById('overlay-img').src = homeItem.Home; document.getElementById('image-overlay').classList.remove('hidden'); };
                const hideP = () => { document.getElementById('image-overlay').classList.add('hidden'); setTimeout(() => isPeeking = false, 100); };
                hImg.onmousedown = showP; hImg.ontouchstart = showP; window.onmouseup = hideP; window.ontouchend = hideP;
            } else document.getElementById('home-preview').classList.add('hidden');

            const hasL = items.some(i => i.Kategorie === 'Logistik' && i.Typ !== 'Alert'), hasA = items.some(i => i.Kategorie === 'Aktivität'), hasF = items.some(i => i.Risiko || i['Shot idea'] || i.Objektiv || i.Wichtig);
            document.getElementById('dot-logistik').classList.toggle('hidden', !hasL); document.getElementById('dot-aktiv').classList.toggle('hidden', !hasA); document.getElementById('dot-foto').classList.toggle('hidden', !hasF);

            document.getElementById('day-alerts').innerHTML = ""; document.getElementById('sec-logistik').innerHTML = ""; document.getElementById('sec-aktiv').innerHTML = ""; document.getElementById('sec-foto').innerHTML = "";
            items.forEach(item => {
                const icon = icons[item.Typ] || icons[item.kat] || "📍";
                if (item.Typ === "Alert") document.getElementById('day-alerts').appendChild(createAlertCard(item));
                if (item.Kategorie === "Logistik" && item.Typ !== "Alert") document.getElementById('sec-logistik').appendChild(createCard(item, icon));
                else if (item.Kategorie === "Aktivität") document.getElementById('sec-aktiv').appendChild(createCard(item, icon));
                if (item.Risiko || item["Shot idea"] || item.Objektiv || item.Wichtig) document.getElementById('sec-foto').appendChild(createInfoCard(item));
            });
            if (hasL) switchTab('logistik'); else if (hasA) switchTab('aktiv'); else switchTab('foto');
        }

        function openHikeOverlay() {
            const region = document.getElementById('display-region').innerText.toLowerCase().trim();
            const hikes = hikeData.filter(h => h.Region.toLowerCase().trim().includes(region) || (region.includes("paine") && h.Region.toLowerCase().includes("paine")));
            hikes.sort((a, b) => (localStorage.getItem('done_hikes') || '[]').includes(a.Region + a.Title) - (localStorage.getItem('done_hikes') || '[]').includes(b.Region + b.Title));
            const slider = document.getElementById('hike-slider'); slider.innerHTML = "";
            hikes.forEach(hike => {
                const komootId = hike.KomootLink.split('tour/')[1]?.split('?')[0];
                const staticMap = komootId ? `https://photos.komoot.de/www/maps/tour/${komootId}@1x3072x2304.jpg` : '';
                const hId = hike.Region + hike.Title, done = (localStorage.getItem('done_hikes') || '[]').includes(hId);
                const card = document.createElement('div'); card.className = `min-w-full h-full snap-center relative overflow-hidden ${done ? 'item-done' : ''}`;
                card.innerHTML = `<img src="${hike.Image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute top-8 left-6 z-10 flex flex-col gap-2"><div class="bg-black/30 backdrop-blur-lg border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px] font-bold flex items-center gap-2"><span>🥾</span> ${hike.Level}</div>${done ? '<div class="bg-emerald-500 text-white px-3 py-1 rounded text-[10px] font-black self-start mt-1 shadow-lg">✓ ERLEDIGT</div>' : ''}</div><div class="absolute inset-x-0 bottom-0 spot-text-gradient p-8 pt-32 flex flex-col justify-end z-20"><h3 class="text-3xl font-black text-white leading-tight mb-2">${hike.Title}</h3><div class="flex gap-3 mb-4 text-white/90 font-mono text-[10px] font-bold uppercase"><span class="bg-white/10 px-2 py-1 rounded border border-white/10">📏 ${hike.KM}km</span><span class="bg-white/10 px-2 py-1 rounded border border-white/10">▲ ${hike.HM}m</span><span class="bg-white/10 px-2 py-1 rounded border border-white/10">🕒 ${hike.Dauer}</span></div><p class="text-white/80 text-sm mb-4 italic leading-snug">"${hike.Details}"</p><div class="mb-4 rounded-xl overflow-hidden shadow-2xl border border-white/20 bg-slate-900" style="height: 180px;"><img src="${staticMap}" class="w-full h-full object-cover opacity-80"></div><div class="flex items-center gap-3"><a href="${hike.KomootLink}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-4 bg-emerald-600 rounded-xl shadow-xl active:bg-emerald-700 transition-all">🗺️ App öffnen</a><button onclick="toggleDone('${hId}', 'done_hikes', openHikeOverlay)" class="w-16 h-14 flex items-center justify-center rounded-xl border border-white/20 backdrop-blur-md ${done ? 'bg-emerald-500 text-white' : 'bg-white/10 text-white/60'} text-2xl transition-all">✓</button></div></div>`;
                slider.appendChild(card);
            });
            document.getElementById('hike-overlay').classList.remove('hidden'); isPeeking = true;
        }

        function openSpotOverlay() {
            const region = document.getElementById('display-region').innerText.toLowerCase().trim();
            const spots = spotData.filter(s => s.Region.toLowerCase().trim().includes(region) || (region.includes("paine") && s.Region.toLowerCase().includes("paine")));
            spots.sort((a, b) => (localStorage.getItem('done_spots') || '[]').includes(a.Region + a.Title) - (localStorage.getItem('done_spots') || '[]').includes(b.Region + b.Title));
            const slider = document.getElementById('spot-slider'); slider.innerHTML = "";
            spots.forEach(spot => {
                const sId = spot.Region + spot.Title, done = (localStorage.getItem('done_spots') || '[]').includes(sId);
                const card = document.createElement('div'); card.className = `min-w-full h-full snap-center relative overflow-hidden ${done ? 'item-done' : ''}`;
                card.innerHTML = `<img src="${spot.Image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute top-8 left-6 z-10 flex flex-col gap-2"><div class="bg-black/30 backdrop-blur-lg border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px] font-bold flex items-center gap-2 shadow-2xl"><span>🕒</span> ${spot.Licht}</div><div class="bg-black/30 backdrop-blur-lg border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px] font-bold flex items-center gap-2 shadow-2xl"><span>📸</span> ${spot.Linse}</div>${done ? '<div class="bg-green-500 text-white px-3 py-1 rounded text-[10px] font-black self-start mt-1 shadow-lg">✓ BESUCHT</div>' : ''}</div><div class="absolute inset-x-0 bottom-0 spot-text-gradient p-8 pt-32 flex flex-col justify-end z-20"><h3 class="text-3xl font-black text-white leading-tight mb-2 drop-shadow-2xl">${spot.Title}</h3><p class="text-white/80 text-sm mb-6 italic drop-shadow-lg">"${spot.Details}"</p><div class="flex items-center gap-3"><a href="${spot.Maps}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-4 bg-white/10 backdrop-blur-md rounded-xl border border-white/20 active:bg-white/30 transition-all">📍 Standort</a><button onclick="toggleDone('${sId}', 'done_spots', openSpotOverlay)" class="w-16 h-14 flex items-center justify-center rounded-xl border border-white/20 backdrop-blur-md ${done ? 'bg-green-500 text-white' : 'bg-white/10 text-white/60'} text-2xl transition-all">✓</button></div></div>`;
                slider.appendChild(card);
            });
            document.getElementById('spot-overlay').classList.remove('hidden'); isPeeking = true;
        }

        function toggleDone(id, key, refreshFunc) { let d = JSON.parse(localStorage.getItem(key) || '[]'); if (d.includes(id)) d = d.filter(x => x !== id); else d.push(id); localStorage.setItem(key, JSON.stringify(d)); refreshFunc(); }
        function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); isPeeking = false; }
        function showTicket(url) { document.getElementById('ticket-img').src = url; document.getElementById('ticket-overlay').classList.remove('hidden'); }
        function createCard(item, icon) {
            const div = document.createElement('div'); div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3";
            const checklist = item.Checklist ? `<div class="mt-3 pt-3 border-t border-slate-50 space-y-1">${item.Checklist.split(',').map(c => `<div class="text-[10px] text-slate-500 flex items-center gap-2"><input type="checkbox"> ${c.trim()}</div>`).join('')}</div>` : '';
            div.innerHTML = `<div class="flex justify-between items-start gap-3"><div class="flex items-center space-x-4 flex-1 min-w-0"><div class="text-3xl flex-shrink-0">${icon}</div><div class="min-w-0 flex-1"><span class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter font-sans">${item.Typ}</span><h3 class="font-bold text-slate-800 leading-tight break-words text-sm font-sans">${item.Titel}</h3></div></div><div class="text-right flex-shrink-0"><p class="font-bold text-blue-900 text-sm whitespace-nowrap font-mono">${item.Startzeit ? '🕒 ' + item.Startzeit : ''}</p><p class="text-[9px] text-slate-400 mt-0.5 whitespace-nowrap font-mono">${item.Dauer ? '⏳ ' + item.Dauer : ''}</p></div></div>${item.Details ? `<p class="text-xs text-slate-500 mt-3 ml-12 border-l-2 border-slate-100 pl-3 leading-relaxed font-sans italic text-slate-600">${item.Details}</p>` : ''}${checklist}<div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center ml-12 text-[10px] font-sans font-bold"><div class="flex gap-2">${item.Maps ? `<a href="${item.Maps}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md font-sans">📍 MAPS</a>` : ''}${item.Ticket ? `<button onclick="showTicket('${item.Ticket}')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg shadow-md uppercase tracking-tighter font-sans">🎫 Ticket</button>` : ''}</div><span class="font-mono text-slate-400 uppercase truncate max-w-[100px]">${item["Booking Code"] || item.Anbieter || ''}</span></div>`;
            return div;
        }

        function createAlertCard(i) { const d = document.createElement('div'); d.className = "alert-card p-4 rounded-r-xl shadow-sm mb-2"; d.innerHTML = `<h3 class="font-bold text-red-800 text-[11px] uppercase tracking-tight leading-tight font-sans">⚠️ ${i.Titel} ${i.Risiko ? ': ' + i.Risiko : ''}</h3>`; return d; }
        function createInfoCard(i) {
            const d = document.createElement('div'); d.className = "bg-slate-800 text-white p-5 rounded-2xl shadow-lg border-l-4 border-orange-500 mb-4";
            let h = `<h3 class="font-bold text-orange-400 text-[10px] mb-3 uppercase tracking-widest font-sans">${i.Titel}</h3>`;
            if (i.Wichtig) h += `<div class="mb-4 p-3 bg-white/5 rounded-lg border border-white/10 font-sans"><p class="text-[10px] text-orange-300 uppercase font-bold mb-1 font-sans">💡 Wichtig</p><p class="text-sm leading-relaxed italic text-slate-100 font-sans">${i.Wichtig}</p></div>`;
            if (i.Risiko) h += `<p class="text-sm text-red-300 mb-3 font-bold uppercase font-sans">⚠️ Risiko: ${i.Risiko}</p>`;
            if (i["Shot idea"]) h += `<p class="text-xs italic text-slate-300 mb-3 font-sans">"📸 ${i["Shot idea"]}"</p>`;
            if (i.Objektiv || i["Bestes Licht"]) h += `<div class="grid grid-cols-2 gap-3 mt-2 text-[9px] font-sans">${i.Objektiv ? `<div class="bg-slate-700/50 p-2 rounded-lg border border-slate-600 font-sans">Linse: ${i.Objektiv}</div>` : ''}${i["Bestes Licht"] ? `<div class="bg-slate-700/50 p-2 rounded-lg border border-slate-600 font-sans">Licht: ${i["Bestes Licht"]}</div>` : ''}</div>`;
            d.innerHTML = h; return d;
        }

        function switchTab(t) { document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-' + t).classList.add('tab-active'); document.querySelectorAll('main > div:not(#day-alerts)').forEach(s => s.classList.add('hidden')); document.getElementById('sec-' + t).classList.remove('hidden'); }
        function changeDay(d) { if (days[currentDayIndex + d]) { currentDayIndex += d; render(); window.scrollTo(0,0); }}

        // GESTURES
        let sX = 0, sY = 0;
        document.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; }, { passive: true });
        document.addEventListener('touchend', e => {
            if (isPeeking) return;
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 70) changeDay(dX > 0 ? 1 : -1);
        }, { passive: true });

        loadCSV();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
