<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planer Pro | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-icon { width: 48px; height: 52px; background: white; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; align-items: center; line-height: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .cal-m { background: #ef4444; color: white; width: 100%; font-size: 9px; font-weight: 800; padding: 3px 0; text-align: center; text-transform: uppercase; }
        .cal-d { color: #1e293b; font-size: 20px; font-weight: 900; padding-top: 3px; }
        .trip-card { transition: all 0.3s ease; }
        .trip-card:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-6 pb-12">

    <header class="text-center mt-8 mb-12">
        <h1 class="text-4xl font-black tracking-tighter uppercase mb-1 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
            Trip Planer Pro
        </h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold text-center">Family Travel Hub</p>
    </header>

    <div id="trip-container" class="max-w-md mx-auto space-y-6">
        <!-- Trips werden hier geladen -->
    </div>

    <script>
        const icsUrl = "https://www.tripit.com/feed/ical/private/BBA87953-1BD926860BD8421FC64ECFA593BA7A11/tripit.ics";
        const proxyUrl = "https://corsproxy.io/?";

        const tripSettings = {
            "patagonien": { title: "Patagonien", sub: "Chile & Argentinien", img: "https://images.pexels.com/photos/9224586/pexels-photo-9224586.jpeg?auto=compress&w=600", wer: "👨‍👩‍👧‍👦", defaultDate: "15. Okt 2026", sortDate: "20261015" },
            "toskana": { title: "Toskana", sub: "Italien Genussreise", img: "https://images.pexels.com/photos/33242893/pexels-photo-33242893.jpeg?auto=compress&w=600", wer: "👨‍🦱👩‍🦰", defaultDate: "29. May 2026", sortDate: "20260529" },
            "galizien": { title: "Portugal&Spanien", sub: "Porto & Galicia", img: "https://images.pexels.com/photos/3565916/pexels-photo-3565916.jpeg?auto=compress&w=600", wer: "👨‍🦱👦👧", defaultDate: "01. Aug 2026", sortDate: "20260801" },
            "australien": { title: "Australien", sub: "Work & Travel", img: "https://images.pexels.com/photos/2101037/pexels-photo-2101037.jpeg?auto=compress&w=600", wer: "👨‍🦱", defaultDate: "29. Jun 2026", sortDate: "20260629" },
            "kanada": { title: "Kanada", sub: "Vancouver Island", img: "https://images.pexels.com/photos/1525041/pexels-photo-1525041.jpeg?auto=compress&w=600", wer: "👩‍🦰", defaultDate: "28. Aug 2026", sortDate: "20260828" }
        };

        let foundDates = {};

        async function init() {
            renderHub(); 
            await fetchTripIt(); 
        }

        async function fetchTripIt() {
            try {
                const response = await fetch(proxyUrl + encodeURIComponent(icsUrl));
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                let currentEvent = {};
                lines.forEach(line => {
                    if (line.startsWith("BEGIN:VEVENT")) currentEvent = {};
                    if (line.startsWith("SUMMARY:")) currentEvent.summary = line.substring(8).toLowerCase();
                    if (line.startsWith("DTSTART")) {
                        const m = line.match(/\d{8}/);
                        if (m) currentEvent.start = m[0];
                    }
                    if (line.startsWith("END:VEVENT")) {
                        Object.keys(tripSettings).forEach(key => {
                            if (currentEvent.summary && currentEvent.summary.includes(key)) {
                                if (!foundDates[key] || currentEvent.start < foundDates[key]) foundDates[key] = currentEvent.start;
                            }
                        });
                    }
                });
                renderHub(); 
            } catch (e) { console.log("TripIt Sync hakt - nutze Default Daten."); }
        }

        function renderHub() {
            const container = document.getElementById('trip-container');
            const months = ["", "Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
            
            // SORTIERUNG: Aufsteigend (Früheste Reise zuerst)
            const sortedKeys = Object.keys(tripSettings).sort((a, b) => {
                const dateA = foundDates[a] || tripSettings[a].sortDate;
                const dateB = foundDates[b] || tripSettings[b].sortDate;
                return dateA.localeCompare(dateB); // dateA vor dateB für aufsteigend
            });

            container.innerHTML = sortedKeys.map(key => {
                const cfg = tripSettings[key];
                
                let day, mon, year;
                if (foundDates[key]) {
                    year = foundDates[key].substring(0, 4);
                    mon = months[parseInt(foundDates[key].substring(4, 6))];
                    day = foundDates[key].substring(6, 8);
                } else {
                    const parts = cfg.defaultDate.split(" ");
                    day = parts[0].replace(".", "");
                    mon = parts[1];
                    year = parts[2];
                }

                return `
                    <a href="./${key}/index.html" class="trip-card block group relative bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl mb-6">
                        <div class="h-52 w-full relative">
                            <img src="${cfg.img}" class="w-full h-full object-cover opacity-50 group-hover:scale-105 transition-transform duration-1000">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
                        </div>
                        <div class="absolute inset-0 p-6 flex flex-col justify-between">
                            <div class="flex justify-between items-start">
                                <div class="calendar-icon">
                                    <div class="cal-m">${mon}</div>
                                    <div class="cal-d">${day}</div>
                                </div>
                                <div class="bg-blue-600/80 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-white/10 shadow-lg">
                                    ${year}
                                </div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <h2 class="text-3xl font-black italic tracking-tighter uppercase leading-none">${cfg.title}</h2>
                                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mt-1">${cfg.sub}</p>
                                </div>
                                <span class="text-2xl drop-shadow-lg">${cfg.wer}</span>
                            </div>
                        </div>
                    </a>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
