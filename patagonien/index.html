<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Planer Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none !important; }
        .indicator-dot { height: 7px; width: 7px; background-color: #3b82f6; border-radius: 50%; display: inline-block; margin-left: 4px; vertical-align: middle; }
        .alert-card { border-left: 6px solid #ef4444; background-color: #fef2f2; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%); }
        .spot-text-gradient { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        .snap-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .snap-x::-webkit-scrollbar { display: none; }
        .snap-center { scroll-snap-align: center; scroll-snap-stop: always; }
        .calendar-icon { width: 44px; height: 48px; background: white; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; align-items: center; line-height: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-shrink: 0; }
        .cal-m { background: #ef4444; color: white; width: 100%; font-size: 8px; font-weight: 800; padding: 2px 0; text-align: center; text-transform: uppercase; }
        .cal-d { color: #1e293b; font-size: 18px; font-weight: 900; padding-top: 2px; }
        body { overscroll-behavior-y: contain; overflow-x: hidden; position: relative; background-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-20 font-sans">

    <!-- OVERLAYS -->
    <div id="hike-overlay" class="hidden fixed inset-0 z-[140] bg-black flex flex-col font-sans"><button onclick="closeOverlay('hike-overlay')" class="absolute top-6 right-6 z-[150] bg-black/40 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center text-3xl border border-white/10 shadow-2xl">&times;</button><div id="hike-slider" class="flex-1 flex overflow-x-auto snap-x h-full"></div></div>
    <div id="spot-overlay" class="hidden fixed inset-0 z-[110] bg-black flex flex-col font-sans"><button onclick="closeOverlay('spot-overlay')" class="absolute top-6 right-6 z-[130] bg-black/40 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center text-3xl border border-white/10 shadow-2xl">&times;</button><div id="spot-slider" class="flex-1 flex overflow-x-auto snap-x h-full"></div></div>
    <div id="image-overlay" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 backdrop-blur-sm"><img id="overlay-img" src="" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl border border-white/20"></div>

    <!-- Header UI -->
    <header class="relative bg-slate-900 text-white overflow-hidden shadow-lg h-72">
        <div id="hero-img-container" class="absolute inset-0 bg-slate-800">
            <img id="hero-img" src="" class="w-full h-full object-cover opacity-70 transition-opacity duration-500">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        
        <!-- Top Nav -->
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='../index.html'" class="bg-black/40 backdrop-blur-md rounded-full w-9 h-9 flex items-center justify-center border border-white/10 text-white shadow-xl active:scale-90">🏠</button>
                <div class="text-[10px] uppercase tracking-[0.2em] text-blue-300 font-bold" id="display-trip-name">TRIP</div>
            </div>
            <div class="flex gap-4">
                <button onclick="changeDay(-1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center border border-white/10 text-white text-lg active:scale-75">◀</button>
                <button onclick="changeDay(1)" class="bg-black/40 backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center border border-white/10 text-white text-lg active:scale-75">▶</button>
            </div>
        </div>

        <div class="absolute top-16 w-full px-5 flex justify-between items-start z-10">
            <div class="calendar-icon"><div class="cal-m" id="display-month">---</div><div class="cal-d" id="display-day-num">--</div></div>
            <div id="home-preview" class="hidden flex flex-col items-end"><img id="home-img" src="" class="w-28 h-20 object-cover rounded-xl border-2 border-white/40 shadow-2xl bg-slate-700"><span id="home-title" class="text-[9px] text-white font-black mt-1.5 max-w-[110px] truncate uppercase tracking-tight">Hotel</span></div>
        </div>

        <div class="absolute bottom-4 left-0 w-full px-5 flex justify-between items-end z-10">
            <div><h1 id="display-day-label" class="text-xs font-bold uppercase tracking-widest text-white/70 mb-0.5">Tag -</h1><div id="display-region" class="text-xl font-black italic tracking-tight">Lade...</div></div>
            <div class="flex items-center gap-2">
                <button id="btn-hikes" onclick="openHikeOverlay()" class="hidden bg-emerald-600 text-white w-9 h-9 rounded-lg flex items-center justify-center shadow-lg active:scale-90 border border-white/20">🥾</button>
                <button id="btn-camera" onclick="openSpotOverlay()" class="hidden bg-orange-500 text-white w-9 h-9 rounded-lg flex items-center justify-center shadow-lg active:scale-90 border border-white/20">📸</button>
                <div class="flex flex-col text-[10px] font-mono bg-black/50 px-2 py-1 rounded-lg backdrop-blur-md border border-white/10 font-bold">
                    <span>🌅 <span id="sunrise">--:--</span></span><span>🌇 <span id="sunset">--:--</span></span>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white flex justify-around shadow-md sticky top-0 z-20 border-b border-slate-200 text-center font-bold uppercase">
        <button onclick="switchTab('logistik')" id="btn-logistik" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Logistik<span id="dot-logistik" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('aktivität')" id="btn-aktivität" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Aktivität<span id="dot-aktivität" class="indicator-dot hidden"></span></button>
        <button onclick="switchTab('foto')" id="btn-foto" class="p-4 flex-1 text-[11px] uppercase tracking-tighter">Wichtig<span id="dot-foto" class="indicator-dot hidden"></span></button>
    </nav>

    <main id="content-container" class="p-4 max-w-md mx-auto min-h-[50vh]">
        <div id="day-alerts" class="space-y-3 mb-5"></div>
        <div id="sec-logistik" class="space-y-4"></div>
        <div id="sec-aktivität" class="hidden space-y-4"></div>
        <div id="sec-foto" class="hidden space-y-4"></div>
    </main>

    <script>
        let tripData = [], spotData = [], hikeData = [], days = [], currentDayIndex = 0, isPeeking = false;
        const icons = { "flug": "✈️", "hotel": "🏨", "taxi": "🚕", "mietwagen": "🚗", "bus": "🚌", "alert": "⚠️", "ausflug": "🗺️", "hiking": "🥾", "fotospot": "📸", "restaurant": "🍽️" };

        // Helfer zum Normalisieren von CSV-Daten
        function normalizeData(data) {
            return data.map(row => {
                const cleaned = {};
                for (let key in row) {
                    // Entfernt unsichtbare Zeichen (BOM) und normalisiert Key
                    const cleanKey = key.replace(/[^\x20-\x7E]/g, '').toLowerCase().trim().replace(/\s/g, '');
                    cleaned[cleanKey] = row[key] ? row[key].toString().trim() : "";
                }
                return cleaned;
            });
        }

        function loadCSV() {
            const config = { download: true, header: true, skipEmptyLines: true, dynamicTyping: true };
            Papa.parse("trip_data.csv", { ...config, complete: r1 => {
                tripData = normalizeData(r1.data);
                Papa.parse("photo_spots.csv", { ...config, complete: r2 => {
                    spotData = normalizeData(r2.data);
                    Papa.parse("hikes.csv", { ...config, complete: r3 => {
                        hikeData = normalizeData(r3.data);
                        processData();
                    }});
                }});
            }, error: (err) => console.error("CSV Load Error:", err) });
        }

        function timeToMinutes(t) { 
            if (!t || typeof t !== 'string' || !t.includes(':')) return 9999; 
            const p = t.split(':'); 
            return (parseInt(p[0]) * 60) + parseInt(p[1]); 
        }

        function processData() {
            if (tripData.length === 0) {
                document.getElementById('display-region').innerText = "Keine Daten gefunden";
                return;
            }
            // Holen der Tag-Nummern
            days = [...new Set(tripData.map(item => parseInt(item["tag#"])))].filter(n => !isNaN(n)).sort((a, b) => a - b);
            
            const now = new Date(), months = {"Jan":0, "Feb":1, "Mär":2, "Apr":3, "Mai":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Okt":9, "Nov":10, "Dez":11};
            let todayTag = days[0];
            
            tripData.forEach(item => { 
                const dStr = item.datum; 
                if(dStr) { 
                    const p = dStr.split(". "); 
                    if(now.getDate() === parseInt(p[0]) && now.getMonth() === months[p[1]]) todayTag = parseInt(item["tag#"]); 
                }
            });
            currentDayIndex = days.indexOf(todayTag);
            if(currentDayIndex === -1) currentDayIndex = 0;
            render();
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const items = tripData.filter(i => parseInt(i["tag#"]) === currentTagNum);
            items.sort((a, b) => timeToMinutes(a.startzeit) - timeToMinutes(b.startzeit));
            
            const first = items[0] || {};
            const region = first.region || "Unbekannt";
            const dateStr = first.datum || "--. ---";
            
            document.getElementById('display-day-label').innerText = "Tag " + currentTagNum;
            document.getElementById('display-day-num').innerText = dateStr.split(".")[0] || "--";
            document.getElementById('display-month').innerText = dateStr.split(" ")[1] || "---";
            document.getElementById('display-region').innerText = region;
            document.getElementById('sunrise').innerText = first.sunrise || "--:--";
            document.getElementById('sunset').innerText = first.sunset || "--:--";
            document.getElementById('hero-img').src = `https://source.unsplash.com/featured/1200x900?landscape,${encodeURIComponent(region)}`;

            // Trip Name aus URL
            const path = window.location.pathname.split('/');
            document.getElementById('display-trip-name').innerText = path[path.length - 2].toUpperCase();

            // Icons Buttons
            document.getElementById('btn-camera').classList.toggle('hidden', !spotData.some(s => s.region.toLowerCase().includes(region.toLowerCase())));
            document.getElementById('btn-hikes').classList.toggle('hidden', !hikeData.some(h => h.region.toLowerCase().includes(region.toLowerCase())));

            // Hotel Peek
            const homeItem = items.find(i => i.home && i.home !== "");
            const hPre = document.getElementById('home-preview');
            if(homeItem) {
                hPre.classList.remove('hidden');
                document.getElementById('home-img').src = homeItem.home;
                document.getElementById('home-title').innerText = homeItem.hometitle || homeItem.titel;
                const showP = (e) => { e.preventDefault(); isPeeking = true; document.getElementById('overlay-img').src = homeItem.home; document.getElementById('image-overlay').classList.remove('hidden'); };
                const hideP = () => { document.getElementById('image-overlay').classList.add('hidden'); setTimeout(() => isPeeking = false, 100); };
                document.getElementById('home-img').onmousedown = showP; document.getElementById('home-img').ontouchstart = showP; window.onmouseup = hideP; window.ontouchend = hideP;
            } else hPre.classList.add('hidden');

            const hasL = items.some(i => i.kategorie.includes('logistik') && i.typ !== 'alert');
            const hasA = items.some(i => i.kategorie.includes('aktivit'));
            const hasF = items.some(i => i.risiko || i.shotidea || i.objektiv || i.wichtig);

            document.getElementById('dot-logistik').classList.toggle('hidden', !hasL);
            document.getElementById('dot-aktivität').classList.toggle('hidden', !hasA);
            document.getElementById('dot-foto').classList.toggle('hidden', !hasF);

            document.getElementById('day-alerts').innerHTML = ""; 
            document.getElementById('sec-logistik').innerHTML = ""; 
            document.getElementById('sec-aktivität').innerHTML = ""; 
            document.getElementById('sec-foto').innerHTML = "";

            items.forEach(item => {
                const icon = icons[item.typ] || icons[item.kategorie] || "📍";
                if (item.typ === "alert") document.getElementById('day-alerts').appendChild(createAlertCard(item));
                if (item.kategorie.includes("logistik") && item.typ !== "alert") document.getElementById('sec-logistik').appendChild(createCard(item, icon));
                else if (item.kategorie.includes("aktivit")) document.getElementById('sec-aktivität').appendChild(createCard(item, icon));
                if (item.risiko || item.shotidea || item.objektiv || item.wichtig) document.getElementById('sec-foto').appendChild(createInfoCard(item));
            });

            if (hasL) switchTab('logistik'); else if (hasA) switchTab('aktivität'); else switchTab('foto');
        }

        function createCard(item, icon) {
            const div = document.createElement('div'); div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3";
            div.innerHTML = `<div class="flex justify-between items-start gap-3"><div class="flex items-center space-x-4 flex-1 min-w-0"><div class="text-3xl flex-shrink-0">${icon}</div><div class="min-w-0 flex-1"><span class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">${item.typ}</span><h3 class="font-bold text-slate-800 leading-tight break-words text-sm">${item.titel}</h3></div></div><div class="text-right flex-shrink-0"><p class="font-bold text-blue-900 text-sm whitespace-nowrap">${item.startzeit ? '🕒 ' + item.startzeit : ''}</p><p class="text-[9px] text-slate-400 mt-0.5 whitespace-nowrap">${item.dauer ? '⏳ ' + item.dauer : ''}</p></div></div>${item.details ? `<p class="text-xs text-slate-500 mt-3 ml-12 border-l-2 border-slate-100 pl-3 leading-relaxed italic">${item.details}</p>` : ''}<div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center ml-12 text-[10px] font-bold"><a href="${item.maps}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md ${!item.maps ? 'hidden' : ''}">📍 MAPS</a><span class="font-mono text-slate-400 uppercase truncate max-w-[130px]">${item.bookingcode || item.anbieter || ""}</span></div>`;
            return div;
        }

        function createAlertCard(i) { const d = document.createElement('div'); d.className = "alert-card p-4 rounded-r-xl shadow-sm mb-2"; d.innerHTML = `<h3 class="font-bold text-red-800 text-[11px] uppercase tracking-tight leading-tight">⚠️ ${i.titel} ${i.risiko ? ': ' + i.risiko : ''}</h3>`; return d; }
        
        function createInfoCard(i) {
            const d = document.createElement('div'); d.className = "bg-slate-800 text-white p-5 rounded-2xl shadow-lg border-l-4 border-orange-500 mb-4";
            let h = `<h3 class="font-bold text-orange-400 text-[10px] mb-3 uppercase tracking-widest font-sans">${i.titel}</h3>`;
            if (i.wichtig) h += `<div class="mb-4 p-3 bg-white/5 rounded-lg border border-white/10"><p class="text-[10px] text-orange-300 uppercase font-bold mb-1">💡 Wichtig</p><p class="text-sm leading-relaxed italic text-slate-100">${i.wichtig}</p></div>`;
            if (i.risiko) h += `<p class="text-sm text-red-300 mb-3 font-bold uppercase">⚠️ Risiko: ${i.risiko}</p>`;
            if (i.shotidea) h += `<p class="text-xs italic text-slate-300 mb-3">"📸 ${i.shotidea}"</p>`;
            if (i.objektiv || i.besteslicht) h += `<div class="grid grid-cols-2 gap-3 mt-2 text-[9px]">${i.objektiv ? `<div class="bg-slate-700/50 p-2 rounded-lg border border-slate-600">Linse: ${i.objektiv}</div>` : ''}${i.besteslicht ? `<div class="bg-slate-700/50 p-2 rounded-lg border border-slate-600">Licht: ${i.besteslicht}</div>` : ''}</div>`;
            d.innerHTML = h; return d;
        }

        function openHikeOverlay() { isPeeking = true; const region = document.getElementById('display-region').innerText.toLowerCase().trim(); const hikes = hikeData.filter(h => h.region.toLowerCase().includes(region)); const slider = document.getElementById('hike-slider'); slider.innerHTML = ""; hikes.forEach(hike => { const hId = hike.region + hike.title; const done = (localStorage.getItem('done_hikes') || '[]').includes(hId); const card = document.createElement('div'); card.className = `min-w-full h-full snap-center relative overflow-hidden ${done ? 'item-done' : ''}`; card.innerHTML = `<img src="${hike.image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute top-8 left-6 z-10 flex flex-col gap-2 font-bold uppercase"><div class="bg-emerald-600 border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px]">🥾 HIKE</div>${done ? '<div class="bg-green-500 text-white px-3 py-1 rounded text-[10px] shadow-lg">✓ ERLEDIGT</div>' : ''}</div><div class="absolute inset-x-0 bottom-0 spot-text-gradient p-8 pt-32 flex flex-col justify-end z-20"><h3 class="text-3xl font-black text-white leading-tight mb-2 font-sans">${hike.title}</h3><div class="flex gap-3 mb-4 text-white/90 font-mono text-[10px] font-bold uppercase tracking-tighter"><span class="bg-white/10 backdrop-blur-md px-2 py-1 rounded border border-white/10 italic">📏 ${hike.km}km</span><span class="bg-white/10 backdrop-blur-md px-2 py-1 rounded border border-white/10 italic">▲ ${hike.hm}m</span><span class="bg-white/10 backdrop-blur-md px-2 py-1 rounded border border-white/10 italic">🕒 ${hike.dauer}</span></div><p class="text-white/80 text-sm mb-6 italic drop-shadow-lg font-sans">"${hike.details}"</p><div class="flex items-center gap-3"><a href="${hike.komootlink}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-5 bg-emerald-600 rounded-2xl shadow-xl active:bg-emerald-700 transition-all">🗺️ Komoot</a><button onclick="toggleDone('${hId}', 'done_hikes', openHikeOverlay)" class="w-16 h-16 flex items-center justify-center rounded-2xl border border-white/20 backdrop-blur-md ${done ? 'bg-green-500 text-white' : 'bg-white/10 text-white/60'} text-2xl transition-all shadow-xl font-sans">✓</button></div></div>`; slider.appendChild(card); }); document.getElementById('hike-overlay').classList.remove('hidden'); }
        function openSpotOverlay() { isPeeking = true; const region = document.getElementById('display-region').innerText.toLowerCase().trim(); const spots = spotData.filter(s => s.region.toLowerCase().includes(region)); const slider = document.getElementById('spot-slider'); slider.innerHTML = ""; spots.forEach(spot => { const sId = spot.region + spot.title; const done = (localStorage.getItem('done_spots') || '[]').includes(sId); const card = document.createElement('div'); card.className = `min-w-full h-full snap-center relative overflow-hidden ${done ? 'item-done' : ''}`; card.innerHTML = `<img src="${spot.image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute top-8 left-6 z-10 flex flex-col gap-2 font-bold uppercase"><div class="bg-orange-600 border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px]">📸 PHOTO</div>${done ? '<div class="bg-green-500 text-white px-3 py-1 rounded text-[10px] shadow-lg">✓ BESUCHT</div>' : ''}</div><div class="absolute inset-x-0 bottom-0 spot-text-gradient p-8 pt-32 flex flex-col justify-end z-20"><h3 class="text-3xl font-black text-white leading-tight mb-2 drop-shadow-2xl font-sans">${spot.title}</h3><p class="text-white/80 text-sm mb-6 italic drop-shadow-lg font-sans">"${spot.details}"</p><div class="flex items-center gap-3"><a href="${spot.maps}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-5 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 active:bg-white/30 transition-all font-sans">📍 Standort</a><button onclick="toggleDone('${sId}', 'done_spots', openSpotOverlay)" class="w-16 h-16 flex items-center justify-center rounded-2xl border border-white/20 backdrop-blur-md ${done ? 'bg-green-500 text-white' : 'bg-white/10 text-white/60'} text-2xl transition-all shadow-xl">✓</button></div></div>`; slider.appendChild(card); }); document.getElementById('spot-overlay').classList.remove('hidden'); }

        function toggleDone(id, key, refresh) { let d = JSON.parse(localStorage.getItem(key) || '[]'); if (d.includes(id)) d = d.filter(x => x !== id); else d.push(id); localStorage.setItem(key, JSON.stringify(d)); refresh(); }
        function closeOverlay(id) { document.getElementById(id).cl
