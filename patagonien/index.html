<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Planer Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .hidden { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .glass-dark { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: linear-gradient(to bottom, rgba(15,23,42,0.4) 0%, rgba(15,23,42,0.8) 100%); }
        .spot-text-gradient { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        
        /* Unified Carousel Snap */
        .snap-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .snap-x::-webkit-scrollbar { display: none; }
        .snap-center { scroll-snap-align: center; scroll-snap-stop: always; }

        /* Calendar Icon */
        .calendar-capsule { background: white; border-radius: 12px; padding: 4px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        body { background-color: #0f172a; color: #f8fafc; overscroll-behavior-y: contain; }
        .item-done img { filter: grayscale(0.8) brightness(0.4); }
        
        /* Smooth Card Scroll */
        .logistics-area { position: relative; z-index: 20; margin-top: -40px; border-radius: 32px 32px 0 0; background: #f8fafc; min-height: 60vh; }
    </style>
</head>
<body class="font-sans overflow-x-hidden">

    <!-- UNIVERSAL ACTIVITY CAROUSEL -->
    <div id="activity-overlay" class="hidden fixed inset-0 z-[200] bg-black flex flex-col">
        <!-- Header mit Filtern -->
        <div class="p-6 flex justify-between items-center z-30">
            <div class="flex gap-2" id="carousel-filters">
                <button onclick="filterCarousel('all')" class="glass px-4 py-2 rounded-xl text-xs font-bold border-blue-500">Alle</button>
                <button onclick="filterCarousel('hiking')" class="glass p-2 rounded-xl text-xl">🥾</button>
                <button onclick="filterCarousel('photo')" class="glass p-2 rounded-xl text-xl">📸</button>
                <button onclick="filterCarousel('museum')" class="glass p-2 rounded-xl text-xl">🏛️</button>
            </div>
            <button onclick="closeOverlay('activity-overlay')" class="glass w-12 h-12 rounded-full flex items-center justify-center text-3xl">&times;</button>
        </div>
        
        <div id="unified-slider" class="flex-1 flex overflow-x-auto snap-x h-full">
            <!-- Dynamisch: Hikes + Spots -->
        </div>
    </div>

    <!-- HOME MODAL -->
    <div id="home-modal" class="hidden fixed inset-0 z-[210] bg-slate-950/80 backdrop-blur-md items-center justify-center p-8" onclick="this.classList.remove('open')">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-4xl mb-4">🏠</div>
            <h2 class="text-xl font-bold mb-2 text-slate-800">Trip wechseln</h2>
            <button onclick="window.location.href='../index.html'" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold mb-3 shadow-lg">Zum Hauptmenü</button>
            <button onclick="document.getElementById('home-modal').classList.remove('open')" class="w-full py-3 text-slate-400 font-medium">Abbrechen</button>
        </div>
    </div>

    <!-- BACKGROUND IMAGE -->
    <div class="fixed inset-0 z-0">
        <img id="hero-img" src="" class="w-full h-full object-cover opacity-60">
        <div class="absolute inset-0 hero-gradient"></div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="relative z-10 w-full min-h-screen">
        
        <!-- Header Info -->
        <header class="p-6 pt-8 flex flex-col h-[40vh] justify-between">
            <div class="flex justify-between items-start">
                <div id="trip-title-trigger" class="glass px-4 py-2 rounded-2xl">
                    <span class="text-blue-300 text-[10px] font-black tracking-[0.2em]" id="display-trip-name text-white">TRIP</span>
                </div>
                
                <div class="glass px-2 py-1.5 rounded-2xl flex items-center gap-3">
                    <button onclick="changeDay(-1)" class="w-8 h-8 flex items-center justify-center text-xl">◀</button>
                    <div class="calendar-capsule">
                        <span id="display-day-num" class="text-slate-900 text-xl font-black leading-none">--</span>
                        <span id="display-month" class="text-red-500 text-[9px] font-black uppercase">---</span>
                    </div>
                    <button onclick="changeDay(1)" class="w-8 h-8 flex items-center justify-center text-xl">▶</button>
                </div>
            </div>

            <div class="mb-12">
                <div class="flex items-baseline gap-2 mb-2">
                    <h1 id="display-region" class="text-4xl font-black tracking-tighter uppercase italic leading-none drop-shadow-2xl text-white">Lade...</h1>
                    <span id="display-day-label" class="text-blue-400 font-bold text-sm">TAG -</span>
                </div>
                <div class="inline-flex items-center gap-4 glass-dark px-4 py-2 rounded-2xl text-[11px] font-bold text-white">
                    <span>🌅 <span id="sunrise">--:--</span></span>
                    <span class="opacity-20">|</span>
                    <span>🌇 <span id="sunset">--:--</span></span>
                </div>
            </div>
        </header>

        <!-- Fixed Logistics Area -->
        <div class="logistics-area p-6 shadow-[0_-20px_50px_rgba(0,0,0,0.3)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-slate-400 text-xs font-black uppercase tracking-[0.2em]">Fixe Termine</h2>
                <div id="home-preview" class="hidden">
                    <img id="home-img" src="" class="w-12 h-12 object-cover rounded-xl border border-slate-200 shadow-lg" onclick="showPeek()">
                </div>
            </div>

            <div id="sec-logistik" class="space-y-4">
                <!-- TripIt Data cards -->
            </div>

            <!-- Empty State -->
            <div id="logistik-empty" class="hidden py-10 text-center text-slate-300 italic text-sm">
                Keine fixen Termine für heute.
            </div>
        </div>
    </div>

    <!-- Floating Activity Button -->
    <button onclick="openActivityHub()" class="fixed bottom-6 right-6 z-[100] bg-blue-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-transform border-4 border-white/20">
        🗺️
    </button>

    <script>
        let tripData = [], spotData = [], hikeData = [], days = [], currentDayIndex = 0, isPeeking = false;
        const icons = { "flug": "✈️", "hotel": "🏨", "taxi": "🚕", "mietwagen": "🚗", "bus": "🚌", "alert": "⚠️", "restaurant": "🍽️" };

        function getVal(obj, key) { if (!obj) return ""; const foundKey = Object.keys(obj).find(k => k.toLowerCase().trim().replace(' ', '') === key.toLowerCase().trim().replace(' ', '')); return foundKey ? obj[foundKey].toString().trim() : ""; }

        function loadCSV() {
            const config = { download: true, header: true, skipEmptyLines: true };
            Papa.parse("trip_data.csv", { ...config, complete: r1 => {
                tripData = r1.data;
                Papa.parse("photo_spots.csv", { ...config, complete: r2 => {
                    spotData = r2.data;
                    Papa.parse("hikes.csv", { ...config, complete: r3 => {
                        hikeData = r3.data; processData();
                    }});
                }});
            }});
        }

        function processData() {
            if (tripData.length === 0) return;
            days = [...new Set(tripData.map(item => parseInt(getVal(item, "Tag#"))))].filter(n => !isNaN(n)).sort((a, b) => a - b);
            const now = new Date(), months = {"Jan":0, "Feb":1, "Mär":2, "Apr":3, "Mai":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Okt":9, "Nov":10, "Dez":11};
            let todayTag = days[0];
            tripData.forEach(item => { if(getVal(item, "Datum")) { const p = getVal(item, "Datum").split(". "); if(now.getDate() === parseInt(p[0]) && now.getMonth() === months[p[1]]) todayTag = parseInt(getVal(item, "Tag#")); }});
            currentDayIndex = days.indexOf(todayTag);
            if(currentDayIndex === -1) currentDayIndex = 0;
            render();
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const items = tripData.filter(i => parseInt(getVal(i, "Tag#")) === currentTagNum);
            
            const first = items[0] || {};
            const region = getVal(first, "Region") || "Nature";
            const dateStr = getVal(first, "Datum") || "--. ---";

            document.getElementById('display-day-label').innerText = "TAG " + currentTagNum;
            document.getElementById('display-day-num').innerText = dateStr.split(".")[0] || "--";
            document.getElementById('display-month').innerText = dateStr.split(" ")[1] || "---";
            document.getElementById('display-region').innerText = region;
            document.getElementById('sunrise').innerText = getVal(first, "Sunrise") || "--:--";
            document.getElementById('sunset').innerText = getVal(first, "Sunset") || "--:--";
            document.getElementById('hero-img').src = `https://images.unsplash.com/photo-1544198365-f5d60b6d8190?auto=format&fit=crop&w=800&q=80`; // Patagonien Default

            // Trip Name from Path
            const path = window.location.pathname.split('/');
            document.getElementById('display-trip-name').innerText = path[path.length - 2].toUpperCase();

            // Hotel Preview
            const homeItem = items.find(i => getVal(i, "Home") !== "");
            if(homeItem) {
                document.getElementById('home-preview').classList.remove('hidden');
                document.getElementById('home-img').src = getVal(homeItem, "Home");
            }

            // Fixed Logistics List
            const logContainer = document.getElementById('sec-logistik');
            logContainer.innerHTML = "";
            const fixedItems = items.filter(i => getVal(i, "Kategorie").toLowerCase() === 'logistik' || getVal(i, "Startzeit"));
            
            if(fixedItems.length === 0) document.getElementById('logistik-empty').classList.remove('hidden');
            else document.getElementById('logistik-empty').classList.add('hidden');

            fixedItems.forEach(item => {
                const type = getVal(item, "Typ").toLowerCase();
                const icon = icons[type] || "📍";
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4";
                div.innerHTML = `
                    <div class="text-3xl">${icon}</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-bold text-slate-400 uppercase">${getVal(item, "Typ")}</div>
                        <h3 class="font-bold text-slate-800 truncate">${getVal(item, "Titel")}</h3>
                        <p class="text-xs text-slate-500 truncate">${getVal(item, "Details")}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-black text-blue-600">${getVal(item, "Startzeit")}</div>
                        <div class="text-[10px] text-slate-300 font-bold">${getVal(item, "Dauer")}</div>
                    </div>
                `;
                logContainer.appendChild(div);
            });
        }

        // UNIFIED HUB LOGIC
        function openActivityHub() {
            const region = document.getElementById('display-region').innerText.toLowerCase().trim();
            const hikes = hikeData.filter(h => getVal(h, "Region").toLowerCase().includes(region)).map(i => ({...i, category: 'hiking'}));
            const spots = spotData.filter(s => getVal(s, "Region").toLowerCase().includes(region)).map(i => ({...i, category: 'photo'}));
            
            const allActivities = [...hikes, ...spots];
            allActivities.sort((a, b) => (localStorage.getItem('done_items') || '[]').includes(getVal(a, "Title")) - (localStorage.getItem('done_items') || '[]').includes(getVal(b, "Title")));

            const slider = document.getElementById('unified-slider');
            slider.innerHTML = "";

            allActivities.forEach(item => {
                const id = getVal(item, "Title");
                const done = (localStorage.getItem('done_items') || '[]').includes(id);
                const isHike = item.category === 'hiking';
                
                const card = document.createElement('div');
                card.className = `min-w-full h-full snap-center relative overflow-hidden activity-card ${item.category} ${done ? 'item-done' : ''}`;
                card.innerHTML = `
                    <img src="${getVal(item, "Image")}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute top-8 left-6 z-10 flex flex-col gap-2 font-bold uppercase tracking-widest">
                        <div class="${isHike ? 'bg-emerald-600' : 'bg-orange-600'} border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px]">
                            ${isHike ? '🥾 HIKE' : '📸 PHOTO'}
                        </div>
                        ${isHike ? `<div class="bg-black/30 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px]">Lvl: ${getVal(item, "Level")}</div>` : ''}
                    </div>
                    <div class="absolute inset-x-0 bottom-0 spot-text-gradient p-10 pt-32 flex flex-col justify-end z-20">
                        <h3 class="text-4xl font-black text-white leading-tight mb-3 drop-shadow-2xl">${getVal(item, "Title")}</h3>
                        ${isHike ? `
                            <div class="flex gap-3 mb-4 text-white font-mono text-[10px] font-bold uppercase tracking-tighter">
                                <span class="bg-white/20 backdrop-blur-md px-2 py-1 rounded">📏 ${getVal(item, "KM")}km</span>
                                <span class="bg-white/20 backdrop-blur-md px-2 py-1 rounded">▲ ${getVal(item, "HM")}m</span>
                            </div>
                        ` : ''}
                        <p class="text-white/80 text-sm mb-8 italic drop-shadow-lg leading-relaxed">"${getVal(item, "Details")}"</p>
                        <div class="flex items-center gap-3">
                            <a href="${isHike ? getVal(item, "KomootLink") : getVal(item, "Maps")}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-5 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 active:bg-white/30 transition-all">
                                ${isHike ? '🗺️ Komoot' : '📍 Standort'}
                            </a>
                            <button onclick="toggleGlobalDone('${id}')" class="w-16 h-16 flex items-center justify-center rounded-2xl border border-white/20 backdrop-blur-md ${done ? 'bg-green-500 text-white' : 'bg-white/10 text-white/60'} text-2xl transition-all">✓</button>
                        </div>
                    </div>
                `;
                slider.appendChild(card);
            });
            document.getElementById('activity-overlay').classList.remove('hidden');
        }

        function filterCarousel(type) {
            const cards = document.querySelectorAll('.activity-card');
            cards.forEach(c => {
                if(type === 'all' || c.classList.contains(type)) c.classList.remove('hidden');
                else c.classList.add('hidden');
            });
        }

        function toggleGlobalDone(id) {
            let d = JSON.parse(localStorage.getItem('done_items') || '[]');
            if (d.includes(id)) d = d.filter(x => x !== id); else d.push(id);
            localStorage.setItem('done_items', JSON.stringify(d));
            openActivityHub();
        }

        // Home Long Press
        let pressTimer;
        document.getElementById('trip-title-trigger').onmousedown = () => pressTimer = setTimeout(() => document.getElementById('home-modal').classList.add('open'), 600);
        document.getElementById('trip-title-trigger').onmouseup = () => clearTimeout(pressTimer);

        function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); }
        function switchTab(t) { 
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active')); 
            event.currentTarget.classList.add('tab-active');
            // Hier könnten wir Filter für die Logistik einbauen, falls nötig
        }
        function changeDay(d) { if (days[currentDayIndex + d]) { currentDayIndex += d; render(); window.scrollTo(0,0); } }

        loadCSV();
    </script>
</body>
</html>
