<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Planer Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .glass-alert { background: rgba(239, 68, 68, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 20px; }
        .glass-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .hero-gradient { background: linear-gradient(to bottom, rgba(15,23,42,0.5) 0%, rgba(15,23,42,0) 20%, rgba(15,23,42,0) 50%, rgba(15,23,42,0.9) 100%); }
        
        .fade-mask {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, transparent 200px, black 380px, black calc(100% - 150px), transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, transparent 220px, black 380px, black calc(100% - 150px), transparent 100%);
        }

        .snap-x { scroll-snap-type: x mandatory; scrollbar-width: none; }
        .snap-x::-webkit-scrollbar { display: none; }
        .snap-center { scroll-snap-align: center; scroll-snap-stop: always; }
        
        body { background-color: #050505; color: #f8fafc; overscroll-behavior-y: contain; overflow: hidden; height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .item-done img { filter: grayscale(0.8) brightness(0.3); }
        .spot-text-gradient { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        
        .view-btn.active { background: white; color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .filter-btn.active { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.2); color: white; }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="font-sans">

    <!-- HOME MODAL -->
    <div id="home-modal" class="hidden fixed inset-0 z-[300] bg-slate-950/90 backdrop-blur-xl items-center justify-center p-8" onclick="this.classList.remove('open')">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-5xl mb-4 text-slate-800">🏠</div>
            <h2 class="text-2xl font-bold mb-2 text-slate-900">Trip wechseln</h2>
            <button onclick="window.location.href='../index.html'" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3 shadow-lg active:scale-95 transition-transform">Zum Hauptmenü</button>
            <button onclick="document.getElementById('home-modal').classList.remove('open')" class="w-full py-3 text-slate-400 font-bold uppercase tracking-widest text-[10px]">Abbrechen</button>
        </div>
    </div>

    <!-- ACTIVITY HUB OVERLAY -->
    <div id="activity-overlay" class="hidden fixed inset-0 z-[250] bg-black flex flex-col font-sans">
        <div class="p-6 flex justify-between items-center z-30">
            <div class="flex gap-2">
                <button onclick="renderActivitySlider('all')" id="filter-all" class="filter-btn glass-nav px-4 py-2 rounded-xl text-[10px] font-black text-white uppercase border border-white/10">Alle</button>
                <button onclick="renderActivitySlider('hiking')" id="filter-hiking" class="filter-btn glass-nav p-2 rounded-xl text-xl border border-white/10">🥾</button>
                <button onclick="renderActivitySlider('photo')" id="filter-photo" class="filter-btn glass-nav p-2 rounded-xl text-xl border border-white/10">📸</button>
            </div>
            <!-- FIX: Globaler Schließen-Button oben rechts, immer da! -->
            <button onclick="closeOverlay('activity-overlay')" class="glass-nav w-12 h-12 rounded-full flex items-center justify-center text-3xl text-white font-bold border border-white/20 shadow-xl">&times;</button>
        </div>
        <div id="unified-slider" class="flex-1 flex overflow-x-auto snap-x h-full text-white"></div>
    </div>

    <div id="image-overlay" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4 backdrop-blur-sm"><img id="overlay-img" src="" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl border border-white/20 font-sans"></div>

    <div class="fixed inset-0 z-0">
        <img id="hero-img" src="" class="w-full h-full object-cover opacity-60 transition-opacity duration-1000">
        <div class="absolute inset-0 hero-gradient"></div>
    </div>

    <!-- STATIC HEADER -->
    <header class="fixed top-0 inset-x-0 z-[100] p-6 pt-10 pointer-events-none">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div id="trip-title-trigger" class="flex-1 pointer-events-auto active:opacity-50 transition-opacity">
                <div id="display-trip-name" class="text-blue-400 text-[10px] font-black tracking-[0.4em] uppercase mb-1 drop-shadow-md">TRIP</div>
                <h1 id="display-region" class="text-3xl font-black tracking-tighter uppercase italic leading-tight text-white drop-shadow-2xl">Lade...</h1>
                <div class="flex flex-col gap-1.5 mt-3">
                    <div class="flex items-center gap-2 text-[15px] font-black text-white tracking-wide uppercase">
                        <span id="display-day-label">Tag -</span>
                        <span class="opacity-30 font-light">•</span>
                        <span id="display-date">--. ---</span>
                    </div>
                    <div class="flex items-center gap-3 text-[13px] font-black text-white/70 font-mono tracking-tight mt-0.5">
                        <svg class="w-3.5 h-3.5 text-white opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke-width="2.5"></circle><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2.5" stroke-linecap="round"></path></svg>
                        <span class="flex items-center gap-1.5 font-bold italic font-sans">↑ <span id="sunrise">--:--</span></span>
                        <span class="flex items-center gap-1.5 font-bold italic font-sans">↓ <span id="sunset">--:--</span></span>
                    </div>
                </div>
            </div>
            <div id="home-preview" class="hidden pointer-events-auto flex flex-col items-end pt-5">
                <img id="home-img" src="" class="w-24 h-24 object-cover rounded-3xl border-2 border-white/20 shadow-2xl bg-slate-800">
                <div class="text-[8px] font-black uppercase text-right mt-2 text-white/40 truncate w-24 tracking-widest" id="home-title">Hotel</div>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <div id="scroll-container" class="relative z-10 w-full h-screen overflow-y-auto pt-[340px] pb-48 px-6 fade-mask">
        <div class="max-w-md mx-auto">
            <div id="sec-alerts" class="space-y-3 mb-6"></div>
            <div id="dynamic-content" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <!-- BOTTOM COMMAND BAR -->
    <nav class="fixed bottom-6 inset-x-0 z-[150] px-4 pointer-events-none">
        <div class="max-w-md mx-auto glass-nav flex justify-between items-center p-2 rounded-[2rem] pointer-events-auto shadow-2xl border border-white/10">
            <div class="flex items-center gap-1">
                <button onclick="changeDay(-1)" class="w-11 h-11 flex items-center justify-center text-white active:scale-75 transition-transform"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
                <button onclick="changeDay(1)" class="w-11 h-11 flex items-center justify-center text-white active:scale-75 transition-transform"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
            </div>
            <div class="flex p-1 bg-white/5 rounded-2xl border border-white/5 mx-2 flex-1">
                <button onclick="switchView('fix')" id="view-fix-btn" class="view-btn active flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Fix</button>
                <button onclick="switchView('explore')" id="view-explore-btn" class="view-btn flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Explore</button>
            </div>
            <button onclick="openActivityHub()" class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl active:scale-90 transition-transform border border-white/20">🗺️</button>
        </div>
    </nav>

    <script>
        let tripData = [], spotData = [], hikeData = [], days = [], currentDayIndex = 0, isPeeking = false, currentView = 'fix';
        const icons = { "flug": "✈️", "hotel": "🏨", "taxi": "🚕", "mietwagen": "🚗", "bus": "🚌", "alert": "⚠️", "restaurant": "🍽️" };
        const regionImages = { "buenos aires": "https://images.pexels.com/photos/34104156/pexels-photo-34104156.jpeg?auto=format&fit=crop&w=800&q=80", "el calafate argentinien": "https://images.pexels.com/photos/9224586/pexels-photo-9224586.jpeg?auto=format&fit=crop&w=800&q=80", "torres del paine": "https://images.unsplash.com/photo-1544198365-f5d60b6d8190?auto=format&fit=crop&w=800&q=80", "san pedro de atacama": "https://images.pexels.com/photos/20853000/pexels-photo-20853000.jpeg?auto=format&fit=crop&w=800&q=80" };

        function getVal(obj, key) { if (!obj) return ""; const foundKey = Object.keys(obj).find(k => k.toLowerCase().trim().replace(/\s/g, '') === key.toLowerCase().trim().replace(/\s/g, '')); return foundKey ? obj[foundKey].toString().trim() : ""; }
        function loadCSV() { Papa.parse("trip_data.csv", { download: true, header: true, skipEmptyLines: true, complete: r1 => { tripData = r1.data; Papa.parse("photo_spots.csv", { download: true, header: true, skipEmptyLines: true, complete: r2 => { spotData = r2.data; Papa.parse("hikes.csv", { download: true, header: true, skipEmptyLines: true, complete: r3 => { hikeData = r3.data; processData(); }}); }}); }}); }
        function timeToMinutes(t) { if (!t || !t.includes(':')) return 9999; const p = t.split(':'); return (parseInt(p[0]) * 60) + parseInt(p[1]); }

        function processData() {
            if (tripData.length === 0) return;
            days = [...new Set(tripData.map(item => parseInt(getVal(item, "Tag#"))))].filter(n => !isNaN(n)).sort((a, b) => a - b);
            const now = new Date(), months = {"Jan":0, "Feb":1, "Mär":2, "Apr":3, "Mai":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Okt":9, "Nov":10, "Dez":11};
            let todayTag = days[0];
            tripData.forEach(item => { if(getVal(item, "Datum")) { const p = getVal(item, "Datum").split(". "); if(now.getDate() === parseInt(p[0]) && now.getMonth() === months[p[1]]) todayTag = parseInt(getVal(item, "Tag#")); }});
            currentDayIndex = days.indexOf(todayTag);
            if(currentDayIndex === -1) currentDayIndex = 0;
            render();
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-fix-btn`).classList.toggle('active', view === 'fix');
            document.getElementById(`view-explore-btn`).classList.toggle('active', view === 'explore');
            renderContent();
        }

        function render() {
            const currentTagNum = days[currentDayIndex];
            const items = tripData.filter(i => parseInt(getVal(i, "Tag#")) === currentTagNum);
            let dataRow = items[0];
            if (!dataRow) {
                for (let i = currentDayIndex; i >= 0; i--) {
                    const prevItems = tripData.filter(item => parseInt(getVal(item, "Tag#")) === days[i]);
                    if (prevItems.length > 0 && getVal(prevItems[0], "Region")) { dataRow = prevItems[0]; break; }
                }
            }
            const region = getVal(dataRow, "Region") || "Nature", regionKey = region.toLowerCase().trim();
            const dateStr = getVal(items[0], "Datum") || "--. ---";
            document.getElementById('display-day-label').innerText = "Tag " + currentTagNum;
            document.getElementById('display-date').innerText = dateStr;
            document.getElementById('display-region').innerText = region;
            document.getElementById('sunrise').innerText = getVal(dataRow, "Sunrise") || "--:--";
            document.getElementById('sunset').innerText = getVal(dataRow, "Sunset") || "--:--";
            const firstImg = tripData.find(row => getVal(row, "Region").toLowerCase().trim() === regionKey && getVal(row, "RegionImage") !== "");
            document.getElementById('hero-img').src = firstImg ? getVal(firstImg, "RegionImage") : (regionImages[regionKey] || `https://source.unsplash.com/featured/1200x900?landscape,${encodeURIComponent(region)}`);
            const path = window.location.pathname.split('/');
            document.getElementById('display-trip-name').innerText = (path[path.length - 2] || "Trip").toUpperCase();
            const homeItem = items.find(i => getVal(i, "Home") !== "");
            if(homeItem) {
                const hImg = document.getElementById('home-img');
                document.getElementById('home-preview').classList.remove('hidden');
                hImg.src = getVal(homeItem, "Home");
                document.getElementById('home-title').innerText = getVal(homeItem, "Hometitle") || getVal(homeItem, "Titel");
                const startP = (e) => { e.preventDefault(); isPeeking = true; document.getElementById('overlay-img').src = getVal(homeItem, "Home"); document.getElementById('image-overlay').classList.remove('hidden'); };
                const endP = () => { document.getElementById('image-overlay').classList.add('hidden'); setTimeout(() => isPeeking = false, 100); };
                hImg.onmousedown = startP; hImg.ontouchstart = startP; window.onmouseup = endP; window.ontouchend = endP;
            } else document.getElementById('home-preview').classList.add('hidden');
            const fixedItems = items.filter(i => getVal(i, "Startzeit") !== "" || getVal(i, "Kategorie").toLowerCase() === 'logistik');
            switchView(fixedItems.length === 0 ? 'explore' : 'fix');
        }

        function renderContent() {
            const currentTagNum = days[currentDayIndex];
            const items = tripData.filter(i => parseInt(getVal(i, "Tag#")) === currentTagNum);
            const alertCont = document.getElementById('sec-alerts');
            const dynamicCont = document.getElementById('dynamic-content');
            alertCont.innerHTML = ""; dynamicCont.innerHTML = "";
            items.filter(item => getVal(item, "Typ").toLowerCase() === "alert" || getVal(item, "Risiko")).forEach(item => {
                const d = document.createElement('div'); d.className = "glass-alert p-5 shadow-lg mb-3";
                d.innerHTML = `<div class="flex items-center gap-4"><span>⚠️</span><div><p class="text-[10px] font-black uppercase text-red-200 tracking-widest font-sans">Alert</p><p class="text-sm font-bold text-white">${getVal(item, "Titel")} ${getVal(item, "Risiko") ? ' - ' + getVal(item, "Risiko") : ''}</p></div></div>`;
                alertCont.appendChild(d);
            });
            if (currentView === 'fix') {
                const fixed = items.filter(i => getVal(i, "Startzeit") !== "" || getVal(i, "Kategorie").toLowerCase() === 'logistik').sort((a,b) => timeToMinutes(getVal(a,"Startzeit")) - timeToMinutes(getVal(b,"Startzeit")));
                if(fixed.length === 0) { dynamicCont.innerHTML = "<div class='py-10 text-center text-white/20 italic text-sm font-sans'>Keine Termine.</div>"; return; }
                fixed.forEach(item => {
                    const card = document.createElement('div'); card.className = "glass-card p-5 shadow-xl";
                    card.innerHTML = `<div class="flex items-center gap-5 mb-4"><div class="text-4xl">${icons[getVal(item,"Typ").toLowerCase()] || "📍"}</div><div class="flex-1 min-w-0 font-sans"><p class="text-[9px] font-black text-blue-300 uppercase tracking-widest mb-1 font-sans">${getVal(item, "Typ")}</p><h3 class="font-bold text-white text-base leading-tight break-words">${getVal(item, "Titel")}</h3></div><div class="text-right flex-shrink-0 font-mono"><p class="text-base font-black text-white">${getVal(item, "Startzeit")}</p><p class="text-[9px] text-white/30 font-bold uppercase">${getVal(item, "Dauer")}</p></div></div><p class="text-xs text-white/50 leading-relaxed italic mb-4 ml-14 break-words">${getVal(item, "Details")}</p><div class="flex justify-between items-center ml-14 pt-3 border-t border-white/5">${getVal(item,"Maps") ? `<a href="${getVal(item,"Maps")}" target="_blank" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest shadow-lg">📍 MAPS</a>` : '<span></span>'}<span class="text-[9px] font-mono text-white/20 uppercase">${getVal(item, "BookingCode") || getVal(item, "Anbieter") || ""}</span></div>`;
                    dynamicCont.appendChild(card);
                });
            } else {
                const region = document.getElementById('display-region').innerText.toLowerCase().trim();
                const combined = [...hikeData.filter(h => getVal(h, "Region").toLowerCase().includes(region)).map(i => ({...i, cat: 'hike'})), ...spotData.filter(s => getVal(s, "Region").toLowerCase().includes(region)).map(i => ({...i, cat: 'spot'}))];
                if(combined.length === 0) { dynamicCont.innerHTML = "<div class='py-10 text-center text-white/20 italic text-sm'>Nichts gefunden.</div>"; return; }
                combined.forEach((item) => {
                    const isH = item.cat === 'hike';
                    const card = document.createElement('div'); card.className = "glass-card p-4 shadow-xl flex items-center gap-4 font-sans";
                    card.onclick = () => openActivityHub(getVal(item, "Title"));
                    card.innerHTML = `<div class="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 border border-white/10"><img src="${getVal(item,"Image")}" class="w-full h-full object-cover"></div><div class="flex-1 min-w-0"><p class="text-[9px] font-black ${isH ? 'text-emerald-400' : 'text-orange-400'} uppercase tracking-widest mb-1 font-sans font-sans">${isH ? 'Hike' : 'Photospot'}</p><h3 class="font-bold text-white text-sm leading-tight break-words font-sans">${getVal(item, "Title")}</h3></div><div class="text-white/20 font-sans">❯</div>`;
                    dynamicCont.appendChild(card);
                });
            }
        }

        function openActivityHub(targetTitle = null) { renderActivitySlider('all', targetTitle); document.getElementById('activity-overlay').classList.remove('hidden'); }
        function renderActivitySlider(f, targetTitle = null) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${f}`).classList.add('active');
            const region = document.getElementById('display-region').innerText.toLowerCase().trim();
            let h = hikeData.filter(h => getVal(h, "Region").toLowerCase().includes(region)).map(i => ({...i, cat: 'hiking'}));
            let s = spotData.filter(s => getVal(s, "Region").toLowerCase().includes(region)).map(i => ({...i, cat: 'photo'}));
            let combined = f === 'all' ? [...h, ...s] : (f === 'hiking' ? h : s);
            const slider = document.getElementById('unified-slider'); slider.innerHTML = "";
            if (combined.length === 0) { slider.innerHTML = "<div class='flex-1 flex items-center justify-center italic text-white/30 font-sans'>Keine Einträge für diesen Filter.</div>"; return; }
            combined.forEach(item => {
                const isH = item.cat === 'hiking', id = getVal(item, "Title"), done = (localStorage.getItem('done_items') || '[]').includes(id);
                const csvMaps = getVal(item, "Maps");
                const mapsUrl = csvMaps !== "" ? csvMaps : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(getVal(item, 'Title') + ' ' + getVal(item, 'Region'))}`;
                const card = document.createElement('div'); card.className = `min-w-full h-full snap-center relative overflow-hidden ${done ? 'item-done' : ''}`;
                card.id = "slide-" + btoa(id).substring(0,10);
                card.innerHTML = `<img src="${getVal(item, "Image")}" class="absolute inset-0 w-full h-full object-cover font-sans">
                <button onclick="toggleGlobalDone('${id}')" class="absolute top-8 right-6 z-30 w-16 h-16 flex items-center justify-center rounded-2xl border border-white/20 backdrop-blur-md ${done ? 'bg-green-500 text-white shadow-[0_0_20px_rgba(34,197,94,0.5)]' : 'bg-black/30 text-white/60'} text-2xl transition-all shadow-xl font-sans font-sans">✓</button>
                <div class="absolute top-8 left-6 z-10 flex flex-col gap-2 font-bold uppercase tracking-widest font-sans font-sans"><div class="${isH ? 'bg-emerald-600' : 'bg-orange-600'} border border-white/10 px-3 py-1.5 rounded-full text-white text-[10px] tracking-widest shadow-xl font-sans">${isH ? '🥾 HIKE' : '📸 PHOTO'}</div></div><div class="absolute inset-x-0 bottom-0 spot-text-gradient p-10 pt-32 flex flex-col justify-end z-20 font-sans font-black uppercase tracking-tighter"><h3 class="text-3xl font-black text-white leading-tight mb-2 drop-shadow-2xl font-sans">${getVal(item, "Title")}</h3>${isH ? `<div class="flex gap-3 mb-4 text-white/80 font-mono text-[10px] font-bold uppercase tracking-widest"><span class="bg-white/10 px-2 py-1 rounded">📏 ${getVal(item, "KM")}km</span><span class="bg-white/10 px-2 py-1 rounded">▲ ${getVal(item, "HM")}m</span></div>` : ''}<p class="text-white/80 text-sm mb-8 italic leading-relaxed font-sans font-medium font-sans">"${getVal(item, "Details")}"</p><div class="flex items-center gap-3 font-sans"><a href="${isH ? getVal(item, "KomootLink") : mapsUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 text-white font-black text-xs uppercase tracking-[0.2em] py-5 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 active:bg-white/30 transition-all font-sans">${isH ? '🗺️ Komoot' : '📍 Standort'}</a></div></div>`;
                slider.appendChild(card);
            });
            if (targetTitle) { const tId = "slide-" + btoa(targetTitle).substring(0,10); setTimeout(() => { const el = document.getElementById(tId); if (el) el.scrollIntoView({ behavior: 'auto', inline: 'center' }); }, 10); }
        }

        function toggleGlobalDone(id) { let d = JSON.parse(localStorage.getItem('done_items') || '[]'); if (d.includes(id)) d = d.filter(x => x !== id); else d.push(id); localStorage.setItem('done_items', JSON.stringify(d)); const activeF = document.querySelector('.filter-btn.active')?.id.replace('filter-', '') || 'all'; renderActivitySlider(activeF); }
        function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); isPeeking = false; }
        function changeDay(d) { if (days[currentDayIndex + d]) { currentDayIndex += d; render(); document.getElementById('scroll-container').scrollTo(0,0); } }

        document.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; }, { passive: true });
        document.addEventListener('touchend', e => {
            const overlays = ['activity-overlay', 'image-overlay', 'home-modal'];
            if (overlays.some(id => !document.getElementById(id).classList.contains('hidden')) || isPeeking) return;
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 80) changeDay(dX > 0 ? 1 : -1);
        }, { passive: true });

        let pressTimer;
        const trigger = document.getElementById('trip-title-trigger');
        trigger.onmousedown = () => pressTimer = setTimeout(() => document.getElementById('home-modal').classList.add('open'), 600);
        trigger.onmouseup = () => clearTimeout(pressTimer);
        trigger.ontouchstart = () => pressTimer = setTimeout(() => document.getElementById('home-modal').classList.add('open'), 600);
        trigger.ontouchend = () => clearTimeout(pressTimer);

        loadCSV();
    </script>
</body>
</html>
